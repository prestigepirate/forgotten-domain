<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgotten Domain: Wyvvrstvrm</title>
    <link rel="stylesheet" href="css/menu.css?v=6">
</head>
<body>
    <!-- Top Header Bar -->
    <header class="menu-header">
        <div class="header-title">
            <span class="title-text">FORGOTTEN DOMAIN: WYVVRSTVRM</span>
            <span class="title-subtitle">a syncingships project</span>
        </div>
        <div class="header-mana">
            <div class="mana-orb white"></div>
            <div class="mana-orb blue"></div>
            <div class="mana-orb purple"></div>
            <div class="mana-orb red"></div>
            <div class="mana-orb green"></div>
        </div>
        <button class="login-btn" id="login-btn">
            <span class="login-text">LOG IN</span>
        </button>
        <div class="user-menu hidden" id="user-menu">
            <span class="user-menu-name" id="user-menu-name">@prestigepiratex</span>
            <button class="logout-btn" id="logout-btn">LOG OUT</button>
        </div>
    </header>

    <!-- Cosmic Background -->
    <div class="cosmic-bg">
        <div class="stars" id="stars"></div>
        <div class="nebula nebula-1"></div>
        <div class="nebula nebula-2"></div>
        <div class="nebula nebula-3"></div>
    </div>

    <!-- Main Menu Container -->
    <div class="main-menu">
        <!-- Five Planets Container -->
        <div class="planets-container">
            <!-- Voxya - Deep Purple/Black -->
            <a href="game.html" class="planet-link" data-continent="voxya">
                <div class="planet planet-voxya">
                    <div class="planet-glow"></div>
                    <img src="assets/planets/voxya-planet.png" alt="Voxya" class="planet-image">
                </div>
                <span class="planet-name">Voxya</span>
            </a>

            <!-- Arcanica - Bright Blue -->
            <a href="arcanica.html" class="planet-link" data-continent="arcanica">
                <div class="planet planet-arcanica">
                    <div class="planet-glow"></div>
                    <img src="assets/planets/arcanica-planet.png" alt="Arcanica" class="planet-image">
                </div>
                <span class="planet-name">Arcanica</span>
            </a>

            <!-- Verdantia - Vibrant Green -->
            <a href="verdantia.html" class="planet-link" data-continent="verdantia">
                <div class="planet planet-verdantia">
                    <div class="planet-glow"></div>
                    <img src="assets/planets/verdantia-planet.png" alt="Verdantia" class="planet-image">
                </div>
                <span class="planet-name">Verdantia</span>
            </a>

            <!-- Emboria - Fiery Orange/Red -->
            <a href="emboria.html" class="planet-link" data-continent="emboria">
                <div class="planet planet-emboria">
                    <div class="planet-glow"></div>
                    <img src="assets/planets/emboria-planet.png" alt="Emboria" class="planet-image">
                </div>
                <span class="planet-name">Emboria</span>
            </a>

            <!-- Silvaryn - Mystical Pink/Violet -->
            <a href="silvaryn.html" class="planet-link" data-continent="silvaryn">
                <div class="planet planet-silvaryn">
                    <div class="planet-glow"></div>
                    <img src="assets/planets/silvaryn-planet.png" alt="Silvaryn" class="planet-image">
                </div>
                <span class="planet-name">Silvaryn</span>
            </a>
        </div>
    </div>

    <!-- User Display -->
    <div class="user-display">
        <span class="user-username">@prestigepiratex</span>
    </div>

    <!-- Planet Connection Lines -->
    <svg class="planet-connections" id="planet-connections" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:rgba(124,58,237,0.1)"/>
                <stop offset="50%" style="stop-color:rgba(124,58,237,0.6)"/>
                <stop offset="100%" style="stop-color:rgba(124,58,237,0.1)"/>
            </linearGradient>
            <filter id="lineGlow">
                <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>
    </svg>

    <!-- Loading Overlay -->
    <div class="loading-overlay hidden" id="loading-overlay">
        <div class="loading-bg-painted">
            <svg class="loading-bg-svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
                <!-- Distant lightning cracks -->
                <polyline points="300,0 280,80 310,120 270,200" fill="none" stroke="rgba(168,139,250,0.08)" stroke-width="1.5"/>
                <polyline points="800,0 820,60 790,100 840,160" fill="none" stroke="rgba(168,139,250,0.06)" stroke-width="1"/>
                <!-- Broken tower left -->
                <rect x="150" y="320" width="26" height="480" fill="#0a0a12" rx="1"/>
                <rect x="155" y="280" width="16" height="40" fill="#0d0d15" rx="1"/>
                <polygon points="155,280 163,240 171,280" fill="#0d0d15"/>
                <rect x="200" y="400" width="18" height="400" fill="#08080e" rx="1"/>
                <polygon points="200,400 209,370 218,400" fill="#08080e"/>
                <!-- Collapsed wall section -->
                <polygon points="163,480 200,510 200,490 163,460" fill="#0c0c14"/>
                <rect x="215" y="450" width="14" height="14" fill="#0c0c14"/>
                <rect x="230" y="440" width="10" height="24" fill="#0a0a10"/>
                <!-- Broken tower right -->
                <rect x="900" y="350" width="30" height="450" fill="#0a0a12" rx="1"/>
                <rect x="905" y="310" width="20" height="40" fill="#0d0d15" rx="1"/>
                <polygon points="905,310 915,260 925,310" fill="#0d0d15"/>
                <rect x="960" y="420" width="22" height="380" fill="#08080e" rx="1"/>
                <polygon points="960,420 971,390 982,420" fill="#08080e"/>
                <!-- Scattered rubble -->
                <rect x="340" y="520" width="8" height="12" fill="#0e0e16" rx="1"/>
                <rect x="355" y="530" width="12" height="8" fill="#0c0c14" rx="1"/>
                <rect x="740" y="510" width="10" height="14" fill="#0e0e16" rx="1"/>
                <rect x="730" y="540" width="14" height="6" fill="#0c0c14" rx="1"/>
                <rect x="820" y="560" width="8" height="10" fill="#0a0a12" rx="1"/>
                <rect x="180" y="560" width="10" height="6" fill="#0a0a12" rx="1"/>
                <!-- Floating isle 1 -->
                <ellipse cx="550" cy="200" rx="80" ry="12" fill="#0c0c18" opacity="0.5"/>
                <rect x="510" y="188" width="10" height="15" fill="#0e0e1a" rx="1" opacity="0.5"/>
                <!-- Floating isle 2 -->
                <ellipse cx="700" cy="160" rx="50" ry="8" fill="#0a0a14" opacity="0.35"/>
            </svg>
        </div>
        <img class="loading-bg-image" src="assets/loading/voxya-warp.jpg" alt="Voxya at War" onerror="this.style.display='none'">
        <div class="loading-bg-vignette"></div>
        <div class="loading-ember-particles" id="loading-embers"></div>
        <div class="loading-content">
            <div class="loading-spin-ring">
                <div class="loading-spin-ring-outer"></div>
                <div class="loading-spin-ring-mid"></div>
                <div class="loading-spin-ring-inner"></div>
            </div>
            <p class="loading-text-warp">ENTERING VOXYA</p>
            <div class="loading-bar">
                <div class="loading-progress" id="loading-progress"></div>
            </div>
        </div>
    </div>

    <!-- Bottom Action Bar -->
    <footer class="bottom-action-bar">
        <button class="action-tab" id="btn-home">
            <span class="tab-label">Home</span>
        </button>
        <button class="action-tab" id="btn-profile">
            <span class="tab-label">Profile</span>
        </button>
        <button class="action-tab" id="btn-spellbook">
            <span class="tab-label">Spellbook</span>
        </button>
        <button class="action-tab" id="btn-academics">
            <span class="tab-label">Academics</span>
        </button>
    </footer>

    <script src="js/menu.js?v=6" type="module"></script>
</body>
</html>
