<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Echo — GLB Exporter</title>
<style>
  body { font-family: monospace; background: #111; color: #aaa; padding: 30px; }
  h1 { color: #998877; }
  .status { margin: 10px 0; padding: 8px 12px; background: #1a1a1a; border-left: 3px solid #555; }
  .status.ok { border-left-color: #5a5; }
  .status.err { border-left-color: #a55; }
  a { color: #ccaa77; }
</style>
</head>
<body>
<h1>Echo GLB Exporter</h1>
<p>Building and downloading 3 castle models as .glb files...</p>
<div id="log"></div>

<script type="importmap">
{
  "imports": {
    "three":            "https://unpkg.com/three@0.184.0/build/three.module.js",
    "three/addons/":    "https://unpkg.com/three@0.184.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

// Polyfills for chainable translate/rotate helpers
THREE.Object3D.prototype.translate  = function(x,y,z){this.position.x+=x;this.position.y+=y;this.position.z+=z;return this;};
THREE.Object3D.prototype.translateX = function(v){this.position.x+=v;return this;};
THREE.Object3D.prototype.translateY = function(v){this.position.y+=v;return this;};
THREE.Object3D.prototype.translateZ = function(v){this.position.z+=v;return this;};
THREE.Object3D.prototype.rotateX = function(v){this.rotation.x+=v;return this;};
THREE.Object3D.prototype.rotateY = function(v){this.rotation.y+=v;return this;};
THREE.Object3D.prototype.rotateZ = function(v){this.rotation.z+=v;return this;};

const logEl = document.getElementById('log');

function log(msg, ok = true) {
  const div = document.createElement('div');
  div.className = 'status ' + (ok ? 'ok' : 'err');
  div.textContent = msg;
  logEl.appendChild(div);
}

function mat(hex, opts = {}) {
  return new THREE.MeshStandardMaterial({ color: hex, roughness: 0.65, metalness: 0.08, ...opts });
}
function mesh(geo, material) {
  const m = new THREE.Mesh(geo, material);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

const stoneDark  = mat('#3a3532');
const stoneMid   = mat('#4a4540');
const stoneLight = mat('#5c5650');
const roofSlate  = mat('#1a181c', { roughness: 0.5, metalness: 0.15 });
const spireMetal = mat('#2a2522', { roughness: 0.35, metalness: 0.6 });
const windowGlow = new THREE.MeshBasicMaterial({ color: '#cc9944' });

function downloadGLB(scene, filename) {
  const exporter = new GLTFExporter();
  exporter.parse(scene, (glb) => {
    const blob = new Blob([glb], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    log(`✓ Downloaded: ${filename}`);
  }, (err) => {
    log(`✗ Error exporting ${filename}: ${err}`, false);
  }, { binary: true });
}

// ============================================================
// 1. TALL CATHEDRAL TOWER
// ============================================================
function buildTallTower() {
  const group = new THREE.Group();

  // Main tower body — octagonal
  group.add(mesh(new THREE.CylinderGeometry(1.2, 1.4, 10, 8), stoneDark).translateY(5));
  // Mid section
  group.add(mesh(new THREE.CylinderGeometry(0.9, 1.2, 5, 8), stoneMid).translateY(11.5));
  // Upper belfry
  group.add(mesh(new THREE.CylinderGeometry(0.6, 0.9, 3.5, 8), stoneLight).translateY(15));
  // Spire
  group.add(mesh(new THREE.ConeGeometry(0.7, 5, 8), roofSlate).translateY(19));
  // Finial
  group.add(mesh(new THREE.ConeGeometry(0.12, 1.5, 6), spireMetal).translateY(22));

  // Buttresses
  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2 + Math.PI / 8;
    const bx = Math.cos(angle) * 1.3;
    const bz = Math.sin(angle) * 1.3;
    group.add(mesh(new THREE.BoxGeometry(0.3, 7, 0.5), stoneMid)
      .translate(bx, 3.5, bz).rotateY(angle));
    group.add(mesh(new THREE.BoxGeometry(0.4, 0.4, 0.6), stoneLight)
      .translate(bx * 1.15, 7, bz * 1.15).rotateY(angle));
  }

  // Flying buttresses
  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2 + Math.PI / 8;
    const s = mesh(new THREE.BoxGeometry(0.2, 3, 0.25), stoneMid);
    s.position.set(Math.cos(angle) * 1.0, 13, Math.sin(angle) * 1.0);
    s.rotation.z = (angle > Math.PI ? 1 : -1) * 0.5;
    s.rotation.y = angle;
    group.add(s);
  }

  // Windows
  for (let level = 0; level < 4; level++) {
    const y = 1.5 + level * 3.5;
    const r = level < 2 ? 1.15 : level === 2 ? 0.85 : 0.55;
    for (let w = 0; w < 4; w++) {
      const angle = (w / 4) * Math.PI * 2 + Math.PI / 8;
      group.add(mesh(new THREE.BoxGeometry(0.08, 1.2, 0.08), windowGlow)
        .translate(Math.cos(angle) * r, y, Math.sin(angle) * r));
    }
  }

  // Entry arch
  group.add(mesh(new THREE.BoxGeometry(0.2, 3, 0.3), stoneLight).translate(0, 1.5, 1.2));
  group.add(mesh(new THREE.BoxGeometry(0.2, 3, 0.3), stoneLight).translate(0, 1.5, -1.2));
  group.add(mesh(new THREE.BoxGeometry(0.2, 0.3, 1.5), stoneLight).translate(0, 3.1, 0));

  return group;
}

// ============================================================
// 2. BRIDGE + GATEHOUSE
// ============================================================
function buildBridgeGate() {
  const group = new THREE.Group();

  // Gate towers
  for (const side of [-1, 1]) {
    group.add(mesh(new THREE.CylinderGeometry(0.8, 0.9, 7, 8), stoneDark)
      .translate(side * 1.8, 3.5, 0));
    group.add(mesh(new THREE.ConeGeometry(0.9, 2.5, 8), roofSlate)
      .translate(side * 1.8, 8.5, 0));
    for (let w = 0; w < 2; w++) {
      group.add(mesh(new THREE.BoxGeometry(0.05, 0.8, 0.05), windowGlow)
        .translate(side * 1.8 + (side > 0 ? -0.7 : 0.7), 2 + w * 2, 0.15));
    }
  }

  // Gate arch
  group.add(mesh(new THREE.BoxGeometry(0.3, 4.5, 0.4), stoneLight).translate(-0.6, 2.25, 0));
  group.add(mesh(new THREE.BoxGeometry(0.3, 4.5, 0.4), stoneLight).translate(0.6, 2.25, 0));
  group.add(mesh(new THREE.BoxGeometry(0.3, 0.35, 1.1), stoneLight).translate(0, 4.6, 0));

  // Portcullis bars
  const ironMat = new THREE.MeshStandardMaterial({ color: '#1a1510', roughness: 0.5, metalness: 0.7 });
  for (let b = 0; b < 5; b++) {
    group.add(mesh(new THREE.BoxGeometry(0.04, 3.2, 0.04), ironMat)
      .translate(-0.5 + b * 0.25, 2.5, 0));
  }

  // Bridge deck
  group.add(mesh(new THREE.BoxGeometry(2.0, 0.3, 5), stoneMid).translate(0, 0.15, 3.0));

  // Bridge walls and crenellations
  for (const side of [-1, 1]) {
    group.add(mesh(new THREE.BoxGeometry(0.2, 0.8, 5), stoneLight)
      .translate(side * 1.0, 0.7, 3.0));
    for (let c = 0; c < 5; c++) {
      group.add(mesh(new THREE.BoxGeometry(0.2, 0.4, 0.35), stoneLight)
        .translate(side * 1.0, 1.3, 1.0 + c * 1.0));
    }
  }

  // Bridge supports
  for (let a = 0; a < 2; a++) {
    group.add(mesh(new THREE.CylinderGeometry(0.2, 0.25, 1.5 + a * 0.5, 6), stoneDark)
      .translate(0, -0.2, 1.5 + a * 3));
  }

  return group;
}

// ============================================================
// 3. CIRCULAR FORTRESS CITY
// ============================================================
function buildCircularFortress() {
  const group = new THREE.Group();

  // Outer ring wall
  const wallR = 3.5;
  const wallH = 3.0;
  const segs = 24;
  for (let i = 0; i < segs; i++) {
    const a0 = (i / segs) * Math.PI * 2;
    const a1 = ((i + 1) / segs) * Math.PI * 2;
    const mx = Math.cos((a0 + a1) / 2) * wallR;
    const mz = Math.sin((a0 + a1) / 2) * wallR;
    const segLen = Math.hypot(Math.cos(a1) * wallR - Math.cos(a0) * wallR, Math.sin(a1) * wallR - Math.sin(a0) * wallR);

    const wallSeg = mesh(new THREE.BoxGeometry(segLen, wallH, 0.45), i % 3 === 0 ? stoneLight : stoneDark);
    wallSeg.position.set(mx, wallH / 2, mz);
    wallSeg.rotation.y = -(a0 + a1) / 2 + Math.PI / 2;
    group.add(wallSeg);

    if (i % 2 === 0) {
      const merlon = mesh(new THREE.BoxGeometry(segLen * 0.4, 0.7, 0.5), stoneLight);
      merlon.position.set(mx, wallH + 0.35, mz);
      merlon.rotation.y = -(a0 + a1) / 2 + Math.PI / 2;
      group.add(merlon);
    }
  }

  // Perimeter towers
  for (let t = 0; t < 6; t++) {
    const angle = (t / 6) * Math.PI * 2;
    const tx = Math.cos(angle) * wallR;
    const tz = Math.sin(angle) * wallR;
    group.add(mesh(new THREE.CylinderGeometry(0.5, 0.55, 5.5, 8), stoneDark).translate(tx, 2.75, tz));
    group.add(mesh(new THREE.ConeGeometry(0.6, 2, 8), roofSlate).translate(tx, 6.0, tz));
    group.add(mesh(new THREE.BoxGeometry(0.06, 0.6, 0.06), windowGlow)
      .translate(tx + Math.cos(angle) * 0.4, 3, tz + Math.sin(angle) * 0.4));
  }

  // Inner keep
  group.add(mesh(new THREE.CylinderGeometry(1.5, 1.7, 6, 12), stoneMid).translateY(3));
  group.add(mesh(new THREE.CylinderGeometry(1.1, 1.5, 3.5, 12), stoneLight).translateY(7));
  group.add(mesh(new THREE.ConeGeometry(1.3, 3.5, 12), roofSlate).translateY(10));
  group.add(mesh(new THREE.SphereGeometry(0.2, 6, 6), spireMetal).translateY(12.2));

  // Keep windows
  for (let f = 0; f < 2; f++) {
    for (let w = 0; w < 6; w++) {
      const angle = (w / 6) * Math.PI * 2;
      const r = f === 0 ? 1.45 : 1.05;
      group.add(mesh(new THREE.BoxGeometry(0.08, 0.9, 0.08), windowGlow)
        .translate(Math.cos(angle) * r, 1.5 + f * 4, Math.sin(angle) * r));
    }
  }

  // Inner buildings
  for (let b = 0; b < 5; b++) {
    const angle = (b / 5) * Math.PI * 2 + 0.3;
    const r = 2.2;
    const h = 1.0 + Math.sin(b * 2.5) * 0.3;
    const bld = mesh(new THREE.BoxGeometry(0.5, h, 0.6), b % 2 === 0 ? stoneDark : stoneMid);
    bld.position.set(Math.cos(angle) * r, h / 2, Math.sin(angle) * r);
    bld.rotation.y = -angle + Math.PI / 2;
    group.add(bld);

    const roof = mesh(new THREE.ConeGeometry(0.4, 0.8, 6), roofSlate);
    roof.position.set(Math.cos(angle) * r, h + 0.3, Math.sin(angle) * r);
    group.add(roof);
  }

  // Gate
  group.add(mesh(new THREE.BoxGeometry(0.35, 3.5, 0.5), stoneLight).translate(-0.5, 1.75, wallR - 0.1));
  group.add(mesh(new THREE.BoxGeometry(0.35, 3.5, 0.5), stoneLight).translate(0.5, 1.75, wallR - 0.1));
  group.add(mesh(new THREE.BoxGeometry(0.35, 0.35, 1.3), stoneLight).translate(0, 3.6, wallR - 0.1));

  return group;
}

// ============================================================
// BUILD AND EXPORT ALL THREE
// ============================================================
log('Building tall_tower.glb...');
await new Promise(r => setTimeout(r, 300));
downloadGLB(buildTallTower(), 'tall_tower.glb');

await new Promise(r => setTimeout(r, 500));
log('Building bridge_gate.glb...');
downloadGLB(buildBridgeGate(), 'bridge_gate.glb');

await new Promise(r => setTimeout(r, 500));
log('Building circular_fortress.glb...');
downloadGLB(buildCircularFortress(), 'circular_fortress.glb');

log('All 3 GLB files should download shortly. Move them to the echo/ directory.', true);
log('Then reload http://localhost:8766/index.html to see them load via GLTFLoader.');
</script>
</body>
</html>
