// ============================================================
// SAVE / LOAD — serialize editor-placed objects to JSON
// ============================================================
function getEditorPlacedObjects() {
  const objects = [];
  const allParents = [worldGroup, castleParent];
  allParents.forEach(parent => {
    parent.children.forEach(child => {
      if (child.userData && child.userData.placedBy === 'editor') {
        const mats = [];
        child.traverse(c => {
          if (c.isMesh && c.material) {
            const list = Array.isArray(c.material) ? c.material : [c.material];
            list.forEach(m => {
              if (m.isMeshStandardMaterial && !mats.includes(m)) mats.push(m);
            });
          }
        });
        const matData = mats.length > 0 ? {
          color: '#' + mats[0].color.getHexString(),
          roughness: mats[0].roughness,
          metalness: mats[0].metalness,
        } : null;

        objects.push({
          assetId: child.userData.assetId,
          assetName: child.userData.assetName,
          px: child.position.x, py: child.position.y, pz: child.position.z,
          rx: child.rotation.x, ry: child.rotation.y, rz: child.rotation.z,
          sx: child.scale.x, sy: child.scale.y, sz: child.scale.z,
          material: matData,
          hp: child.userData.hp,
          maxHP: child.userData.maxHP,
          markerType: child.userData.markerType,
        });
      }
    });
  });
  return objects;
}

function clearEditorPlaced() {
  const allParents = [worldGroup, castleParent];
  allParents.forEach(parent => {
    const toRemove = [];
    parent.children.forEach(child => {
      if (child.userData && child.userData.placedBy === 'editor') toRemove.push(child);
    });
    toRemove.forEach(c => parent.remove(c));
  });
  // Clear custom road segments
  customRoadMeshes.forEach(g => {
    g.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
    worldGroup.remove(g);
  });
  customRoadMeshes.length = 0;
  customRoadSegments.length = 0;
  deselectObject();
  editorState.undoStack = [];
  editorState.redoStack = [];
}

document.getElementById('btn-save').addEventListener('click', () => {
  const data = getEditorPlacedObjects();
  const exportObj = { version:1, objects:data };
  if (customRoadSegments.length > 0) exportObj.customRoadSegments = customRoadSegments;
  const json = JSON.stringify(exportObj, null, 2);
  const blob = new Blob([json], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'voxya-map.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('btn-load').addEventListener('click', () => {
  document.getElementById('file-load').click();
});

document.getElementById('file-load').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.objects || !Array.isArray(data.objects)) { console.error('[Editor] Invalid map file.'); return; }
      clearEditorPlaced();
      let loaded = 0;
      data.objects.forEach(objData => {
        const asset = ASSET_CATALOG[objData.assetId];
        if (!asset) { console.warn('Unknown asset:', objData.assetId); return; }
        let obj;
        if (asset.type === 'glb') {
          const src = getGLBSource(objData.assetId);
          if (src) { obj = deepClone(src); }
          else if (scatterModels[objData.assetId]) { obj = deepClone(scatterModels[objData.assetId]); obj.traverse(applyEditorMaterial); }
        }
        if (!obj && asset.builder) obj = asset.builder();
        if (!obj) { console.warn('Could not build:', objData.assetId); return; }

        obj.position.set(objData.px, objData.py, objData.pz);
        obj.rotation.set(objData.rx, objData.ry, objData.rz);
        obj.scale.set(objData.sx, objData.sy, objData.sz);
        obj.userData = {
          assetId: objData.assetId, assetName: objData.assetName,
          placedBy:'editor', hp:objData.hp, maxHP:objData.maxHP,
          markerType: objData.markerType,
        };

        // Restore material
        if (objData.material) {
          obj.traverse(c => {
            if (c.isMesh && c.material) {
              const list = Array.isArray(c.material) ? c.material : [c.material];
              list.forEach(m => {
                if (m.isMeshStandardMaterial) {
                  if (objData.material.color && m.color && m.color.isColor) m.color.set(objData.material.color);
                  if (objData.material.roughness !== undefined) m.roughness = objData.material.roughness;
                  if (objData.material.metalness !== undefined) m.metalness = objData.material.metalness;
                  m.needsUpdate = true;
                }
              });
            }
          });
        }

        worldGroup.add(obj);
        loaded++;
      });
      // Restore custom road segments
      if (data.customRoadSegments && Array.isArray(data.customRoadSegments)) {
        data.customRoadSegments.forEach(seg => {
          const [x1, z1, x2, z2] = seg;
          addRoadEdge(x1, z1, x2, z2);
          const roadGroup = buildRoad([[x1, z1], [x2, z2]]);
          worldGroup.add(roadGroup);
          customRoadSegments.push([x1, z1, x2, z2]);
          customRoadMeshes.push(roadGroup);
          // Ensure waypoint markers exist
          [[x1, z1], [x2, z2]].forEach(([px, pz]) => {
            const already = waypointMarkers.find(m => m.userData.nodeX === px && m.userData.nodeZ === pz);
            if (!already) {
              const y = getTerrainY(px, pz);
              const marker = buildWaypointMarker(px, pz);
              marker.position.y = y;
              worldGroup.add(marker);
              waypointMarkers.push(marker);
            }
          });
        });
      }
      console.log('[Editor] Loaded ' + loaded + ' objects from map file');
    } catch (err) {
      console.error('[Editor] Failed to parse map file:', err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ============================================================
// MATERIAL EDITING — color, roughness, metalness, presets
// ============================================================
const matColorInput = document.getElementById('mat-color');
const matRoughness = document.getElementById('mat-roughness');
const matMetalness = document.getElementById('mat-metalness');
const valRoughness = document.getElementById('val-roughness');
const valMetalness = document.getElementById('val-metalness');

const MATERIAL_PRESETS = {
  stone_dark:  { color:'#3a3532', roughness:0.65, metalness:0.08 },
  stone_mid:   { color:'#4a4540', roughness:0.65, metalness:0.08 },
  bone:        { color:'#3a3830', roughness:0.55, metalness:0.05 },
  wood:        { color:'#1a1410', roughness:0.90, metalness:0.02 },
  iron:        { color:'#1a1410', roughness:0.70, metalness:0.80 },
  rune:        { color:'#221144', roughness:0.30, metalness:0.10, emissive:'#221144', emissiveIntensity:0.5 },
  moss:        { color:'#0d1410', roughness:0.95, metalness:0.00 },
  bloodstone:  { color:'#1a0c0c', roughness:0.55, metalness:0.12 },
};

function getFirstStdMaterial(obj) {
  let found = null;
  obj.traverse(child => {
    if (found) return;
    if (child.isMesh && child.material && child.material.isMeshStandardMaterial) {
      found = child.material;
    }
    if (child.isMesh && Array.isArray(child.material)) {
      for (const m of child.material) if (m.isMeshStandardMaterial) { found = m; break; }
    }
  });
  return found;
}

function populateMaterialUI() {
  if (!editorState.selected) return;
  const m = getFirstStdMaterial(editorState.selected);
  if (m) {
    const hex = '#' + m.color.getHexString();
    matColorInput.value = hex;
    matRoughness.value = Math.round((m.roughness ?? 0.65) * 100);
    matMetalness.value = Math.round((m.metalness ?? 0.08) * 100);
    valRoughness.textContent = (m.roughness ?? 0.65).toFixed(2);
    valMetalness.textContent = (m.metalness ?? 0.08).toFixed(2);
  }
}

function getEditableMaterials(obj) {
  const mats = [];
  obj.traverse(child => {
    if (!child.isMesh) return;
    const list = Array.isArray(child.material) ? child.material : [child.material];
    list.forEach(m => { if (m && m.isMeshStandardMaterial) mats.push(m); });
  });
  return mats;
}

function applyMaterialToSelected(attrs) {
  if (!editorState.selected) return;
  const mats = getEditableMaterials(editorState.selected);
  if (mats.length === 0) return;
  const prevStates = mats.map(m => ({
    mat:m, color:m.color.getHex(), rough:m.roughness, metal:m.metalness,
    emissive:m.emissive ? m.emissive.getHex() : 0, emissiveIntensity:m.emissiveIntensity ?? 0
  }));
  mats.forEach(m => {
    if (attrs.color !== undefined && m.color && m.color.isColor) m.color.set(attrs.color);
    if (attrs.roughness !== undefined) m.roughness = attrs.roughness;
    if (attrs.metalness !== undefined) m.metalness = attrs.metalness;
    if (attrs.emissive !== undefined && m.emissive && m.emissive.isColor) m.emissive.set(attrs.emissive);
    if (attrs.emissiveIntensity !== undefined) m.emissiveIntensity = attrs.emissiveIntensity;
    m.needsUpdate = true;
  });
  pushUndo({ type:'material', object:editorState.selected, prev:prevStates, attrs:{...attrs} });
}

function updateModeUI() {
  document.querySelectorAll('.asset-btn').forEach(b => b.classList.remove('active'));
  if (editorState.mode === 'place' && editorState.placingAsset) {
    const btn = document.querySelector(`.asset-btn[data-asset="${editorState.placingAsset}"]`);
    if (btn) btn.classList.add('active');
    const asset = ASSET_CATALOG[editorState.placingAsset];
    modeIndicator.textContent = 'Place: ' + (asset ? asset.name : editorState.placingAsset);
  } else if (editorState.mode === 'select') {
    const btn = document.querySelector('.asset-btn[data-tool="select"]');
    if (btn) btn.classList.add('active');
    modeIndicator.textContent = editorState.open ? 'Select' : '';
  } else if (editorState.mode === 'translate') {
    modeIndicator.textContent = editorState.selected ? 'Move  |  Arrows: nudge XZ  |  Shift+Arrow: fast  |  PgUp/PgDn: elevate' : 'Translate';
  } else if (editorState.mode === 'rotate') {
    modeIndicator.textContent = editorState.selected ? 'Rotate  |  Shift+Up/Dn: ±15°  |  Up/Dn: ±3°  |  PgUp/PgDn: elevate' : 'Rotate';
  } else if (editorState.mode === 'scale') {
    modeIndicator.textContent = editorState.selected ? 'Scale  |  Shift+Up/Dn: ±20%  |  Up/Dn: ±5%' : 'Scale';
  } else if (editorState.mode === 'route') {
    if (editorState.routeUnit) {
      const name = editorState.routeUnit.userData.assetName || 'Unit';
      modeIndicator.textContent = `Move ${name}  |  Click a glowing node to set destination  |  Esc: cancel`;
    } else {
      modeIndicator.textContent = 'Move  |  Right-click a creature → Move to begin';
    }
  } else if (editorState.mode === 'connect') {
    modeIndicator.textContent = editorState.connectFirstNode ? 'Connect Roads  |  Click second road node to connect  |  Esc: cancel' : 'Connect Roads  |  Click first road node to start  |  Esc: cancel';
  } else if (editorState.mode === 'elevate') {
    modeIndicator.textContent = editorState.selected ? 'Elevate  |  Arrow Up/Dn: ±Y  |  PgUp/PgDn: fast  |  Q: up' : 'Elevate';
  }

  if (!editorState.open && editorState.mode !== 'route') modeIndicator.textContent = '';
}

// Key bindings — selection + movement + undo
window.addEventListener('keydown', (e) => {
  if (!editorState.open) {
    if (e.key === 'e' || e.key === 'E') { e.preventDefault(); toggleEditor(); }
    return;
  }

  // Don't intercept when user is typing in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  // --- Per-mode controls for selected object ---
  if (editorState.selected) {
    const obj = editorState.selected;
    const mode = editorState.mode;
    const prev = {pos:obj.position.clone(),rot:obj.rotation.clone(),scl:obj.scale.clone()};

    // === ROTATE MODE: Shift+Up/Dn to spin, Left/Right for fine spin ===
    if (mode === 'rotate') {
      const rotStep = e.shiftKey ? THREE.MathUtils.degToRad(15) : THREE.MathUtils.degToRad(3);
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        obj.rotation.y += rotStep;
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        obj.rotation.y -= rotStep;
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        obj.rotation.y -= rotStep;
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
      if (e.key === 'ArrowRight') {
        e.preventDefault();
        obj.rotation.y += rotStep;
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
    }

    // === ELEVATE MODE: Up/Dn nudges Y ===
    if (mode === 'elevate') {
      const yStep = e.shiftKey ? 1.0 : 0.25;
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        obj.position.y += yStep;
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        obj.position.y -= yStep;
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
      // Left/Right still nudge XZ in elevate mode
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        obj.position.x -= yStep;
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
      if (e.key === 'ArrowRight') {
        e.preventDefault();
        obj.position.x += yStep;
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
    }

    // === SCALE MODE: Up/Dn scales uniformly ===
    if (mode === 'scale') {
      const scaleStep = e.shiftKey ? 1.2 : 1.05; // 20% or 5%
      const invStep = 1 / scaleStep;
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        const s = obj.scale;
        const cur = s.x;
        s.setScalar(Math.min(cur * scaleStep, 20));
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        const s = obj.scale;
        const cur = s.x;
        s.setScalar(Math.max(cur * invStep, 0.1));
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
    }

    // === TRANSLATE / SELECT / PLACE: Arrow keys nudge XZ ===
    if (mode === 'translate' || mode === 'select' || mode === 'place') {
      const step = e.shiftKey ? 1.0 : 0.25;
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        obj.position.z -= step;
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        obj.position.z += step;
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        obj.position.x -= step;
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
      if (e.key === 'ArrowRight') {
        e.preventDefault();
        obj.position.x += step;
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
    }

    // PageUp/PageDown — fast Y elevation (all modes)
    if (e.key === 'PageUp') {
      e.preventDefault();
      obj.position.y += 1.0;
      pushUndo({type:'transform',object:obj,prev});
      return;
    }
    if (e.key === 'PageDown') {
      e.preventDefault();
      obj.position.y -= 1.0;
      pushUndo({type:'transform',object:obj,prev});
      return;
    }

    // Q — fine Y up (all modes)
    if (e.key === 'q' || e.key === 'Q') {
      e.preventDefault();
      obj.position.y += 0.25;
      pushUndo({type:'transform',object:obj,prev});
      return;
    }
    // A — fine Y down (only when not typing)
    if (e.key === 'a' || e.key === 'A') {
      if (e.target === document.body || e.target === renderer.domElement) {
        e.preventDefault();
        obj.position.y -= 0.25;
        pushUndo({type:'transform',object:obj,prev});
        return;
      }
    }
  }

  // --- Mode switches ---
  // Route mode — Escape cancels
  if (editorState.mode === 'route') {
    if (e.key === 'Escape') {
      e.preventDefault();
      hideRoadNodeMarkers();
      hideEnhancedMoveIndicators();
      clearRouteVisuals();
      editorState.routeUnit = null;
      editorState.routeWaypoints = [];
      editorState.mode = 'select';
      deselectObject();
      updateModeUI();
      return;
    }
  }
  // Connect mode — Escape cancels
  if (editorState.mode === 'connect') {
    if (e.key === 'Escape') {
      e.preventDefault();
      hideRoadNodeMarkers();
      showRoadNodeMarkers('neutral');
      editorState.connectFirstNode = null;
      editorState.mode = 'select';
      updateModeUI();
      return;
    }
  }
  if (e.key === 'Escape') { e.preventDefault(); deselectObject(); editorState.mode = 'select'; editorState.placingAsset = null; updateModeUI(); }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (editorState.selected) {
      e.preventDefault();
      const obj = editorState.selected;
      pushUndo({type:'delete',object:obj,parent:obj.parent,prev:{pos:obj.position.clone(),rot:obj.rotation.clone(),scl:obj.scale.clone()}});
      obj.parent.remove(obj);
      deselectObject();
    }
  }
  if (e.key === 'w' || e.key === 'W') { e.preventDefault(); setTransformMode('translate'); }
  if (e.key === 'r' || e.key === 'R') { e.preventDefault(); setTransformMode('rotate'); }
  if (e.key === 's' || e.key === 'S') { e.preventDefault(); setTransformMode('scale'); }
  if (e.key === 'v' || e.key === 'V') { e.preventDefault(); setTransformMode('elevate'); }
  if (e.key === 'g' || e.key === 'G') { e.preventDefault(); btnSnap.click(); }
  if (e.key === 'e' || e.key === 'E') { e.preventDefault(); toggleEditor(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && e.shiftKey) { e.preventDefault(); redo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y')) { e.preventDefault(); redo(); }
});

// ============================================================
// RENDER LOOP
// ============================================================
const _clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(_clock.getDelta(), 0.1); // cap to avoid jumps on tab-away
  controls.update();
  if (editorState.selectionBox) editorState.selectionBox.update();

  // Move units along waypoints (time-based)
  [worldGroup, castleParent].forEach(parent => {
    parent.children.forEach(child => {
      if (child.userData && child.userData.moving && child.userData.waypoints && child.userData.waypoints.length > 0) {
        const ud = child.userData;
        const speed = ud.speed || 1.5;
        const wps = ud.waypoints;
        const startPos = ud._routeStartPos || child.position.clone();

        // Build full path: startPos → wps[0] → wps[1] → ...
        const pathPts = [startPos, ...wps.map(w => new THREE.Vector3(w.x, w.y, w.z))];
        let totalDist = 0;
        const cumDist = [0];
        for (let i = 1; i < pathPts.length; i++) {
          totalDist += pathPts[i - 1].distanceTo(pathPts[i]);
          cumDist.push(totalDist);
        }

        if (totalDist < 0.01) { ud.moving = false; return; }

        let traveled = (ud.routeProgress || 0);
        // Climbing: detect slope of current segment & adjust speed
        let segIdx = 1;
        for (let i = 1; i < cumDist.length; i++) {
          if (traveled <= cumDist[i] || i === cumDist.length - 1) { segIdx = i; break; }
        }
        const segDY = segIdx > 0 ? pathPts[segIdx].y - pathPts[segIdx - 1].y : 0;
        const segDXZ = segIdx > 0 ? cumDist[segIdx] - cumDist[segIdx - 1] : 1;
        const slope = segDXZ > 0.01 ? Math.abs(segDY) / segDXZ : 0;
        const climbFactor = slope > 0.08 ? 0.6 : 1.0; // slow to 60% on slopes > 5°
        traveled += speed * climbFactor * dt;
        ud.routeProgress = traveled;
        const frac = Math.min(traveled / totalDist, 1.0);

        if (frac >= 1.0) {
          child.position.copy(pathPts[pathPts.length - 1]);
          child.rotation.x = 0; // reset tilt
          ud.moving = false;
          ud.waypoints = [];
          ud.routeProgress = 0;
          ud._routeStartPos = null;
          clearRouteVisuals();
        } else {
          const targetDist = frac * totalDist;
          for (let i = 1; i < pathPts.length; i++) {
            if (targetDist <= cumDist[i]) {
              const segFrac = (targetDist - cumDist[i - 1]) / (cumDist[i] - cumDist[i - 1]);
              child.position.lerpVectors(pathPts[i - 1], pathPts[i], segFrac);
              // Tilt body on slopes
              const dY = pathPts[i].y - pathPts[i - 1].y;
              const dXZ = cumDist[i] - cumDist[i - 1];
              child.rotation.x = dXZ > 0.01 ? -Math.atan2(dY, dXZ) * 0.5 : 0;
              break;
            }
          }
        }
      }
    });
  });

  // Update animation mixers and state machines
  [worldGroup, castleParent].forEach(parent => {
    parent.children.forEach(child => {
      const ud = child.userData;
      if (!ud || !ud._mixer) return;
      ud._mixer.update(dt);

      // Animation state machine
      const actions = ud._animActions;
      if (!actions) return;

      const moving = ud.moving && ud.waypoints && ud.waypoints.length > 0;
      let targetAnim = 'idle';
      if (moving) {
        const speed = ud.speed || 1.5;
        targetAnim = speed > 2.0 ? 'run' : 'walk';
      }

      if (targetAnim !== ud._currentAnim && actions[targetAnim]) {
        const from = actions[ud._currentAnim];
        const to = actions[targetAnim];
        if (from && from !== to) {
          to.reset().play();
          to.crossFadeFrom(from, 0.3, false);
        } else if (!from) {
          to.reset().play();
        }
        ud._currentAnim = targetAnim;
      }
    });
  });

  // Update floating labels to follow their targets
  if (window._floatingLabels) {
    const _labelBox = new THREE.Box3();
    window._floatingLabels.forEach(sprite => {
      const target = sprite.userData.target;
      if (target) {
        _labelBox.setFromObject(target);
        sprite.position.set(target.position.x, _labelBox.max.y + 2.0, target.position.z);
      }
    });
  }

  // Animate move indicators
  if (_moveIndicators.length > 0) {
    updateMoveIndicators(performance.now() / 1000);
  }

  // VFX animation (tracked via array, not scene scan)
  for (let i = _activeVfx.length - 1; i >= 0; i--) {
    const vfx = _activeVfx[i];
    if (!vfx.parent) { _activeVfx.splice(i, 1); continue; }
    const age = performance.now() / 1000 - vfx.userData._vfxBirth;
    if (vfx.name === 'summon_vfx') {
      const particles = vfx.userData._vfxParticles || [];
      const pillar = vfx.userData._vfxPillar;
      const rift = vfx.userData._vfxRift;
      const disc = vfx.userData._vfxDisc;
      if (rift) { rift.scale.setScalar(1.0 + Math.sin(age * 6) * 0.15); rift.material.opacity = Math.max(0, 0.9 - age * 0.4); }
      if (disc) { disc.scale.setScalar(1.0 + Math.sin(age * 4 + 1) * 0.2); disc.material.opacity = Math.max(0, 0.6 - age * 0.3); }
      particles.forEach(p => {
        p.userData._vfxAge += dt;
        const frac = p.userData._vfxAge / p.userData._vfxLife;
        p.position.y += (p.userData._vfxSpeed || 2) * dt;
        p.material.opacity = Math.max(0, 0.8 * (1 - frac));
        p.scale.setScalar(1 - frac * 0.5);
      });
      if (pillar) { pillar.userData._vfxAge += dt; const pf = pillar.userData._vfxAge / pillar.userData._vfxLife; pillar.scale.y = 1 + pf * 2; pillar.scale.x = 1 + pf * 2; pillar.material.opacity = Math.max(0, 0.5 * (1 - pf)); }
      if (!vfx.userData._vfxSpawned && age > 1.2) {
        vfx.userData._vfxSpawned = true;
        const dl = buildDemonLady(vfx.position.x, vfx.position.z);
        dl.position.y = getTerrainY(vfx.position.x, vfx.position.z) + 0.3;
        dl.userData.placedBy = 'editor';
        worldGroup.add(dl);
        pushUndo({ type: 'place', object: dl, parent: worldGroup });
      }
      if (age > 3.0) { vfx.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) { if (Array.isArray(c.material)) c.material.forEach(m => m.dispose()); else c.material.dispose(); } }); vfx.removeFromParent(); _activeVfx.splice(i, 1); }
    }
    if (vfx.name === 'spell_vfx') {
      vfx.children.forEach(orb => {
        if (!orb.userData._vfxLife) return;
        orb.userData._vfxAge = (orb.userData._vfxAge || 0) + dt;
        const frac = orb.userData._vfxAge / orb.userData._vfxLife;
        orb.position.multiplyScalar(1 + dt * 2);
        orb.material.opacity = Math.max(0, 0.9 * (1 - frac));
        orb.scale.setScalar(1 - frac * 0.7);
      });
      if (age > 1.8) { vfx.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) { if (Array.isArray(c.material)) c.material.forEach(m => m.dispose()); else c.material.dispose(); } }); vfx.removeFromParent(); _activeVfx.splice(i, 1); }
    }
  }

  renderer.render(scene, camera);
}

// -- Runtime swamp ground injection (bypasses browser cache) --
// Rebuild island top material with fresh settings
const swampTopMat = new THREE.MeshStandardMaterial({
  map: groundTex,
  color: '#5a4a20',
  roughness: 0.65,
  metalness: 0.03,
});
swampTopMat.map.colorSpace = THREE.SRGBColorSpace;
swampTopMat.map.needsUpdate = true;

// Rebuild cliff material
const swampCliffMat = new THREE.MeshStandardMaterial({
  color: '#1a1310',
  roughness: 0.80,
  metalness: 0.04,
});

// Hot-swap materials on every island mesh (material slot 2 = top face)
islandGroup.children.forEach(mesh => {
  if (mesh.isMesh && Array.isArray(mesh.material) && mesh.material.length >= 3) {
    mesh.material[2].dispose();
    mesh.material[2] = swampTopMat;
    mesh.material[0].dispose();
    mesh.material[0] = swampCliffMat;
    mesh.material[1].dispose();
    mesh.material[1] = swampCliffMat;
    mesh.material[3].dispose();
    mesh.material[3] = swampCliffMat;
    mesh.material[4].dispose();
    mesh.material[4] = swampCliffMat;
    mesh.material[5].dispose();
    mesh.material[5] = swampCliffMat;
    mesh.material.needsUpdate = true;
  }
});
// Also update the global refs so future buildIsland calls use swamp materials
Object.assign(islandTopMat, { color: swampTopMat.color.clone(), roughness: 0.65, metalness: 0.03 });
Object.assign(cliffMat, { color: swampCliffMat.color.clone(), roughness: 0.80, metalness: 0.04 });
console.log('[Voxya] Swamp ground materials hot-swapped on', islandGroup.children.length, 'islands');
// -- end ground injection --

animate();

  'color:#a78bfa;font-size:16px;', 'color:#666;');
console.log('  Shattered Archipelago — 8 islands, dark water, purple void energy');
console.log('  Meshy AI models: crystals, trees, obelisks, shrines, arches, braziers');
console.log('  Starfield, mist, energy veins — perpetual twilight');
