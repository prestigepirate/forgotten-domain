<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxya — The Hollow Echo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; }

  #loading {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: #080808; color: #999;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px; letter-spacing: 0.08em;
    transition: opacity 0.6s ease-out;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading .pulse {
    display: inline-block; width: 8px; height: 8px; margin: 0 2px;
    border-radius: 50%; background: #665544;
    animation: pulse 1.2s ease-in-out infinite;
  }
  #loading .pulse:nth-child(2) { animation-delay: 0.2s; }
  #loading .pulse:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

  #hud {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    pointer-events: none; z-index: 10;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 11px; color: #555;
    text-align: center; letter-spacing: 0.06em;
  }
  #hud span { margin: 0 16px; }
  #hud .key { color: #998877; }

  /* Editor Toggle */
  #editor-toggle {
    position: fixed; top: 16px; left: 16px; z-index: 200;
    width: 36px; height: 36px; border: none; border-radius: 6px;
    background: #1a1018; color: #998877; cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: left 0.3s ease, background 0.2s;
  }
  #editor-toggle:hover { background: #2a1a28; color: #ccaa77; }
  #editor-toggle.shifted { left: 276px; }

  /* Zoom controls */
  #zoom-controls {
    position: fixed; bottom: 40px; right: 24px; z-index: 200;
    display: flex; flex-direction: column; gap: 4px;
  }
  #zoom-controls button {
    width: 36px; height: 36px; border: none; border-radius: 6px;
    background: #1a1018; color: #998877; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; font-family: monospace;
  }
  #zoom-controls button:hover { background: #2a1a28; color: #ccaa77; }
  #grid-toggle {
    position: fixed; bottom: 120px; right: 24px; z-index: 200;
    width: 36px; height: 36px; border: none; border-radius: 6px;
    background: #1a1018; color: #554433; cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s; font-family: monospace;
  }
  #grid-toggle:hover { background: #2a1a28; color: #ccaa77; }
  #grid-toggle.on { color: #7c3aed; }

  #mode-indicator {
    position: fixed; top: 56px; left: 16px; z-index: 200;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 10px; color: #7c3aed; letter-spacing: 0.06em;
    pointer-events: none; transition: left 0.3s ease;
  }
  #mode-indicator.shifted { left: 276px; }

  /* Editor Panel */
  #editor-panel {
    position: fixed; left: -280px; top: 0; bottom: 0; width: 260px;
    z-index: 150; background: #0e0a10; border-right: 1px solid #1a1020;
    overflow-y: auto; overflow-x: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    transition: left 0.3s ease;
    padding: 8px 0 80px 0;
  }
  #editor-panel.open { left: 0; }

  #editor-panel::-webkit-scrollbar { width: 4px; }
  #editor-panel::-webkit-scrollbar-thumb { background: #1a1025; border-radius: 2px; }

  #editor-panel h2 {
    color: #998877; font-size: 13px; letter-spacing: 0.1em;
    padding: 12px 16px 8px; text-transform: uppercase;
  }

  #editor-panel details { border-bottom: 1px solid #110a14; }
  #editor-panel summary {
    color: #ccaa99; font-size: 12px; letter-spacing: 0.06em;
    padding: 10px 16px; cursor: pointer; outline: none; user-select: none;
  }
  #editor-panel summary:hover { color: #ddbbaa; background: #100c12; }

  .asset-btn {
    display: block; width: 100%; padding: 7px 16px 7px 24px;
    border: none; background: transparent; color: #887766;
    font-size: 11px; text-align: left; cursor: pointer;
    font-family: inherit; letter-spacing: 0.04em;
    transition: background 0.15s, color 0.15s;
  }
  .asset-btn:hover { background: #150e18; color: #aa9977; }
  .asset-btn.active { background: #1a0828; color: #a78bfa; border-left: 2px solid #7c3aed; }

  .asset-btn.tool-mode { color: #7766aa; }
  .asset-btn.tool-mode:hover { color: #9988cc; }

  /* Selected info */
  #selected-info {
    padding: 12px 16px; border-top: 1px solid #1a1020; margin-top: 8px;
  }
  #selected-info .label {
    font-size: 10px; color: #554; text-transform: uppercase; letter-spacing: 0.08em;
  }
  #selected-info .name {
    font-size: 12px; color: #a78bfa; margin: 4px 0 10px;
  }

  .editor-action-btn {
    display: inline-block; padding: 5px 10px; margin: 2px;
    border: 1px solid #2a1a30; border-radius: 3px;
    background: #100a14; color: #998877;
    font-size: 10px; font-family: inherit; cursor: pointer;
    letter-spacing: 0.04em;
  }
  .editor-action-btn:hover { background: #1a0e20; color: #ccaa77; }
  .editor-action-btn.danger { border-color: #301015; color: #885555; }
  .editor-action-btn.danger:hover { background: #1a0810; color: #aa5555; }

  /* Material editing */
  #material-controls { margin-top: 10px; padding-top: 8px; border-top: 1px solid #1a0a18; }
  #material-controls .mat-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
  }
  #material-controls .mat-label {
    font-size: 9px; color: #554; text-transform: uppercase;
    letter-spacing: 0.06em; width: 48px; flex-shrink: 0;
  }
  #material-controls input[type="color"] {
    -webkit-appearance: none; width: 28px; height: 22px; border: 1px solid #2a1a30;
    border-radius: 3px; background: transparent; cursor: pointer; padding: 0;
  }
  #material-controls input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  #material-controls input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }
  #material-controls input[type="range"] {
    -webkit-appearance: none; flex: 1; height: 4px; border-radius: 2px;
    background: #1a1020; outline: none; cursor: pointer;
  }
  #material-controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%;
    background: #7c3aed; cursor: pointer;
  }
  #material-controls .mat-val {
    font-size: 9px; color: #776; width: 24px; text-align: right; flex-shrink: 0;
  }

  .preset-btn {
    display: inline-block; width: 22px; height: 22px; border: 1px solid #2a1a30;
    border-radius: 3px; margin: 2px; cursor: pointer; position: relative;
  }
  .preset-btn:hover { border-color: #7c3aed; transform: scale(1.15); }
  .preset-btn .tooltip {
    display: none; position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: #1a0e20; color: #998877; font-size: 9px; padding: 2px 6px;
    border-radius: 2px; white-space: nowrap; pointer-events: none;
  }
  .preset-btn:hover .tooltip { display: block; }

  /* Bottom toolbar */
  #editor-toolbar {
    position: fixed; bottom: 0; left: -280px; width: 260px;
    z-index: 150; background: #0a060c; border-top: 1px solid #1a1020;
    padding: 8px 12px; display: flex; gap: 6px; flex-wrap: wrap;
    transition: left 0.3s ease;
  }
  #editor-toolbar.open { left: 0; }

  .toolbar-btn {
    padding: 4px 8px; border: 1px solid #1a1025; border-radius: 3px;
    background: #100a14; color: #998877; font-size: 10px;
    font-family: inherit; cursor: pointer; letter-spacing: 0.04em;
  }
  .toolbar-btn:hover { background: #1a0e20; }
  .toolbar-btn.active { background: #1a0828; border-color: #7c3aed; color: #a78bfa; }

  /* Context Menu */
  #ctx-menu {
    position: fixed; z-index: 500; min-width: 170px;
    background: #0d0812; border: 1px solid #2a1a30;
    border-radius: 4px; padding: 4px 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 11px; letter-spacing: 0.04em;
    pointer-events: auto; display: none;
    box-shadow: 0 4px 24px rgba(0,0,0,0.7), 0 0 0 1px rgba(120,60,180,0.15);
  }
  .ctx-item {
    padding: 7px 14px; color: #998877; cursor: pointer;
    transition: background 0.1s, color 0.1s;
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .ctx-item:hover { background: #1a0e20; color: #ccaa99; }
  .ctx-item.has-submenu::after {
    content: '▸'; margin-left: auto; font-size: 10px; color: #665544;
  }
  .ctx-item.has-submenu:hover::after { color: #aa8866; }
  .ctx-item .ctx-icon { width: 14px; text-align: center; flex-shrink: 0; }
  .ctx-divider { border-top: 1px solid #1a1020; margin: 4px 0; }

  /* Submenu */
  #ctx-submenu {
    position: fixed; z-index: 501; min-width: 180px;
    background: #0d0812; border: 1px solid #2a1a30;
    border-radius: 4px; padding: 4px 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 11px; letter-spacing: 0.04em;
    pointer-events: auto; display: none;
    box-shadow: 0 4px 24px rgba(0,0,0,0.7), 0 0 0 1px rgba(120,60,180,0.15);
  }
  .ctx-sub-item {
    padding: 8px 14px; color: #887766; cursor: pointer;
    transition: background 0.1s, color 0.1s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
  }
  .ctx-sub-item:hover { background: #1a0e20; color: #ccaa99; }
  .ctx-sub-item.locked { color: #443322; cursor: not-allowed; }
  .ctx-sub-item.locked:hover { background: transparent; color: #443322; }
  .ctx-sub-item .sub-icon { width: 16px; text-align: center; flex-shrink: 0; }
  .ctx-sub-header {
    padding: 6px 14px; color: #554433; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
</style>
</head>

{
  "imports": {
    "three":          "https://unpkg.com/three@0.184.0/build/three.module.js",
    "three/addons/":  "https://unpkg.com/three@0.184.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';

// Polyfill .translate(x,y,z) chainable helper
THREE.Object3D.prototype.translate = function(x, y, z) {
  this.position.x += x; this.position.y += y; this.position.z += z;
  return this;
};

// Polyfill canvas roundRect for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
    this.beginPath();
    this.moveTo(x + r.tl, y);
    this.lineTo(x + w - r.tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
    this.lineTo(x + w, y + h - r.br);
    this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
    this.lineTo(x + r.bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
    this.lineTo(x, y + r.tl);
    this.quadraticCurveTo(x, y, x + r.tl, y);
    this.closePath();
  };
}

function buildIsland(vertices, height, px, pz) {
  const shape = new THREE.Shape();
  shape.moveTo(vertices[0][0], vertices[0][1]);
  for (let i = 1; i < vertices.length; i++) {
    shape.lineTo(vertices[i][0], vertices[i][1]);
  }
  shape.closePath();

  const geo = new THREE.ExtrudeGeometry(shape, { depth: height, bevelEnabled: true, bevelThickness: 0.4, bevelSize: 0.3, bevelSegments: 3 });
  geo.rotateX(-Math.PI / 2);
  geo.translate(0, 0, 0);

  // Different material per face: top = stone, sides = cliff
  const materials = [
    cliffMat,     // +Y (side 1)
    cliffMat,     // -Y (side 2)
    islandTopMat, // +Z (top, since we rotated)
    cliffMat,     // -Z (bottom)
    cliffMat,     // +X (side)
    cliffMat,     // -X (side)
  ];

  const island = new THREE.Mesh(geo, materials);
  island.position.set(px, 0, pz);
  island.castShadow = true;
  island.receiveShadow = true;
  return island;
}

function scat(n) { return (Math.random() - 0.5) * n; }

function buildRuinedTower(x, z, h) {
  const g = new THREE.Group();
  const tiers = Math.floor(h / 4);
  let cy = 0;
  for (let t = 0; t < tiers; t++) {
    const th = t === tiers - 1 ? 1.5 + Math.random() * 3 : 3.5 + Math.random();
    const r = 0.7 - t * 0.08;
    const segs = t === 0 ? 8 : 6;
    const cyl = mesh(new THREE.CylinderGeometry(r, r + 0.1, th, segs), t % 2 ? stoneMid : stoneDark);
    cyl.position.y = cy + th / 2;
    g.add(cyl);
    // Broken top on last tier
    if (t === tiers - 1) {
      cyl.rotation.z = scat(0.15);
      cyl.rotation.x = scat(0.1);
    }
    cy += th;
    // Windows
    for (let w = 0; w < (t < tiers - 1 ? 3 : 0); w++) {
      const ang = (w / 3) * Math.PI * 2 + scat(0.3);
      const wr = r + 0.05;
      const win = mesh(new THREE.BoxGeometry(0.05, 0.8, 0.05), windowGlow);
      win.position.set(Math.cos(ang) * wr, cy - th + 1 + Math.random() * (th - 2), Math.sin(ang) * wr);
      g.add(win);
    }
  }
  // Rubble at base
  for (let r = 0; r < 8; r++) {
    const rb = mesh(new THREE.BoxGeometry(0.15 + Math.random() * 0.3, 0.08 + Math.random() * 0.15, 0.1 + Math.random() * 0.25), rubbleMat);
    const ang = Math.random() * Math.PI * 2;
    const dist = 0.4 + Math.random() * 0.7;
    rb.position.set(Math.cos(ang) * dist, 0.03, Math.sin(ang) * dist);
    rb.rotation.set(scat(0.8), scat(Math.PI), scat(0.8));
    g.add(rb);
  }
  g.position.set(x, 0, z);
  g.rotation.y = Math.random() * Math.PI * 0.15;
  return g;
}

function buildWall(x, z, len, angle, ruined) {
  const g = new THREE.Group();
  const segLen = 1.5;
  const segCount = Math.floor(len / segLen);
  for (let s = 0; s < segCount; s++) {
    if (ruined && Math.random() < 0.3) continue; // gap
    const h = ruined && Math.random() < 0.25 ? 0.6 + Math.random() * 1.8 : 2.5;
    const w = mesh(new THREE.BoxGeometry(segLen * 0.9, h, 0.35), ruined && Math.random() < 0.3 ? rubbleMat : stoneMid);
    w.position.set(s * segLen, h / 2, 0);
    g.add(w);
    // Crenellations (skip if ruined)
    if (!ruined && s % 2 === 0 && h > 2) {
      const mer = mesh(new THREE.BoxGeometry(segLen * 0.3, 0.45, 0.4), stoneLight);
      mer.position.set(s * segLen, h + 0.22, 0);
      g.add(mer);
    }
  }
  g.position.set(x, 0, z);
  g.rotation.y = angle;
  return g;
}

function buildRuinedHouse(x, z, angle) {
  const g = new THREE.Group();
  const w = 1.5 + Math.random() * 1.5;
  const d = 2 + Math.random() * 1.5;
  const wh = 1.5 + Math.random();
  // Walls (some missing)
  const walls = [
    { px: 0, pz: d / 2, w: w, d: 0.2, h: wh },
    { px: 0, pz: -d / 2, w: w, d: 0.2, h: wh * 0.6 },
    { px: w / 2, pz: 0, w: 0.2, d: d, h: wh },
    { px: -w / 2, pz: 0, w: 0.2, d: d, h: 0 },
  ];
  walls.forEach((wall, i) => {
    if (wall.h === 0 || (Math.random() < 0.25 && i > 0)) return;
    const wm = mesh(new THREE.BoxGeometry(wall.w, wall.h, wall.d), i === 3 ? rubbleMat : stoneDark);
    wm.position.set(wall.px, wall.h / 2, wall.pz);
    wm.rotation.z = scat(i === 3 ? 0.3 : 0.04);
    g.add(wm);
  });
  // Fallen roof pieces
  for (let r = 0; r < 3; r++) {
    const rp = mesh(new THREE.BoxGeometry(0.4 + Math.random() * 0.9, 0.06, 0.5 + Math.random() * 0.6), roofSlate);
    rp.position.set(scat(w * 0.7), 0.02, scat(d * 0.7));
    rp.rotation.set(scat(0.7), scat(Math.PI), scat(0.7));
    g.add(rp);
  }
  // Rubble
  for (let r = 0; r < 5; r++) {
    const rb = mesh(new THREE.BoxGeometry(0.1 + Math.random() * 0.2, 0.04 + Math.random() * 0.1, 0.08 + Math.random() * 0.2), rubbleMat);
    rb.position.set(scat(w), 0.02, scat(d));
    rb.rotation.set(0, scat(Math.PI), scat(0.5));
    g.add(rb);
  }
  g.position.set(x, 0, z);
  g.rotation.y = angle;
  return g;
}

function buildDeadTree(x, z, h) {
  const g = new THREE.Group();

  trunk.rotation.z = scat(0.2);

  const branchCount = 4 + Math.floor(Math.random() * 4);

    const bl = 0.4 + Math.random() * h * 0.4;
    const br = mesh(new THREE.CylinderGeometry(0.02, 0.05, bl, 4), woodDark);
    const by = trunkH * (0.5 + Math.random() * 0.5);
    br.position.y = by;
    br.rotation.z = (Math.random() - 0.5) * 2.2;
    br.rotation.x = (Math.random() - 0.5) * 1.8;
    g.add(br);
    // Sub-branch
    if (Math.random() < 0.5) {
      const sb = mesh(new THREE.CylinderGeometry(0.01, 0.025, bl * 0.5, 3), woodDark);
      sb.position.y = by + scat(0.3);
      sb.rotation.z = (Math.random() - 0.5) * 2.5;
      sb.rotation.x = (Math.random() - 0.5) * 2.0;
      g.add(sb);

  g.rotation.y = Math.random() * Math.PI * 2;

function buildRoad(points) {
  const g = new THREE.Group();
  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i];
    const b = points[i + 1];
    const dx = b[0] - a[0];
    const dz = b[1] - a[1];
    const len = Math.hypot(dx, dz);
    const mx = (a[0] + b[0]) / 2;
    const mz = (a[1] + b[1]) / 2;
    const seg = mesh(new THREE.BoxGeometry(1.2, 0.06, len), roadStone);
    seg.position.set(mx, 0.03, mz);
    seg.rotation.y = Math.atan2(dx, dz);
    seg.receiveShadow = true;
    g.add(seg);
  }
  return g;
}

// Ramped road — segments follow terrain elevation with slope
function buildRampedRoad(points) {
  const g = new THREE.Group();
  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i], b = points[i + 1];
    const ay = getTerrainY(a[0], a[1]) + 0.05;
    const by = getTerrainY(b[0], b[1]) + 0.05;
    const dx = b[0] - a[0], dz = b[1] - a[1];
    const len = Math.hypot(dx, dz);
    const rise = by - ay;
    const midY = (ay + by) / 2;
    const mx = (a[0] + b[0]) / 2, mz = (a[1] + b[1]) / 2;
    const seg = mesh(new THREE.BoxGeometry(1.2, 0.08, len), roadStone);
    seg.position.set(mx, midY, mz);
    seg.rotation.y = Math.atan2(dx, dz);
    seg.rotation.x = -Math.atan2(rise, len);
    seg.receiveShadow = true;
    g.add(seg);
  }
  return g;
}

function buildRamp(width, height, length, material) {
  const g = new THREE.Group();
  const angle = Math.atan2(height, length);
  const diag = Math.sqrt(length * length + height * height);
  const rampGeo = new THREE.BoxGeometry(width, 0.15, diag);
  const ramp = mesh(rampGeo, material);
  ramp.position.set(0, height / 2, length / 2);
  ramp.rotation.x = -angle;
  g.add(ramp);
  // Side rails
  for (const sx of [-1, 1]) {
    for (let s = 0; s < 4; s++) {
      const t = s / 3;
      const ry = t * height;
      const rz = t * length;
      const post = mesh(new THREE.BoxGeometry(0.08, 0.5, 0.08), material);
      post.position.set(sx * (width / 2 - 0.05), ry + 0.25, rz);
      g.add(post);
    }
  }
  return g;
}

function buildTerrainRamp(x, z) {
  const g = new THREE.Group();
  const rampMat = mat('#1e1c18', { roughness: 0.9, metalness: 0.05 }); // matches boulder
  const rampLen = 4.0;
  const rampH = 2.5;
  const rampW = 3.0;
  const angle = Math.atan2(rampH, rampLen);

  // Main ramp wedge
  const rampGeo = new THREE.BoxGeometry(rampW, 0.3, rampLen);
  const ramp = mesh(rampGeo, rampMat);
  ramp.position.set(0, 0, rampLen / 2);
  ramp.rotation.x = -angle;
  g.add(ramp);

  // Thickening layers to fill the wedge
  for (let i = 1; i <= 6; i++) {
    const t = i / 7;
    const layer = mesh(
      new THREE.BoxGeometry(rampW - t * 0.3, 0.25, rampLen * (1 - t) + 0.2),
      rampMat
    );
    layer.position.set(0, t * rampLen * Math.sin(angle) - 0.05, rampLen / 2 - t * 0.5);
    layer.rotation.x = -angle;
    g.add(layer);
  }

  // Top flat platform
  const top = mesh(new THREE.BoxGeometry(rampW * 0.6, 0.3, 1.0), rampMat);
  top.position.set(0, rampLen * Math.sin(angle), rampLen * Math.cos(angle) - 0.3);
  g.add(top);

  // Side embankments for natural look
  for (const sx of [-1, 1]) {
    for (let i = 0; i < 5; i++) {
      const t = i / 4;
      const ex = sx * (rampW / 2 + 0.3);
      const ey = t * rampLen * Math.sin(angle) + 0.15;
      const ez = t * rampLen * Math.cos(angle);
      const rock = mesh(
        new THREE.DodecahedronGeometry(0.3 + Math.random() * 0.3, 0),
        rampMat
      );
      rock.position.set(ex + (Math.random() - 0.5) * 0.3, ey, ez + (Math.random() - 0.5) * 0.3);
      rock.scale.set(0.8 + Math.random() * 0.4, 0.5 + Math.random() * 0.5, 0.8 + Math.random() * 0.4);
      g.add(rock);
    }
  }

  g.position.set(x, -0.15, z);
  g.userData = { assetId: 'terrain_ramp', assetName: 'Terrain Ramp', placedBy: 'editor' };
  return g;
}

// ROAD GRAPH — for pathfinding-based unit movement

const roadGraph = new Map(); // key "x,z" → { x, z, y, neighbors: [{x, z, y, dist}] }

function nodeKey(x, z) {
  return `${x.toFixed(2)},${z.toFixed(2)}`;
}

function addRoadEdge(x1, z1, x2, z2) {
  const k1 = nodeKey(x1, z1);
  const k2 = nodeKey(x2, z2);
  const y1 = getTerrainY(x1, z1);
  const y2 = getTerrainY(x2, z2);
  if (!roadGraph.has(k1)) roadGraph.set(k1, { x: x1, z: z1, y: y1, neighbors: [] });
  if (!roadGraph.has(k2)) roadGraph.set(k2, { x: x2, z: z2, y: y2, neighbors: [] });
  const dxy = Math.hypot(x2 - x1, z2 - z1);
  const dist = Math.hypot(dxy, y2 - y1); // 3D distance
  const n1 = roadGraph.get(k1);
  const n2 = roadGraph.get(k2);
  if (!n1.neighbors.find(n => n.x === x2 && n.z === z2)) n1.neighbors.push({ x: x2, z: z2, y: y2, dist });
  if (!n2.neighbors.find(n => n.x === x1 && n.z === z1)) n2.neighbors.push({ x: x1, z: z1, y: y1, dist });
}

// Dijkstra shortest path on road graph
function findRoadPath(startX, startZ, endX, endZ) {
  const sk = nodeKey(startX, startZ);
  const ek = nodeKey(endX, endZ);
  if (!roadGraph.has(sk) || !roadGraph.has(ek)) return null;

  const dist = new Map();
  const prev = new Map();
  const unvisited = new Set();
  for (const [key] of roadGraph) {
    dist.set(key, Infinity);
    unvisited.add(key);
  }
  dist.set(sk, 0);

  while (unvisited.size > 0) {
    let minKey = null, minDist = Infinity;
    for (const k of unvisited) {
      if (dist.get(k) < minDist) { minDist = dist.get(k); minKey = k; }
    }
    if (minKey === null || minKey === ek) break;
    unvisited.delete(minKey);

    const node = roadGraph.get(minKey);
    for (const nb of node.neighbors) {
      const nk = nodeKey(nb.x, nb.z);
      if (!unvisited.has(nk)) continue;
      const alt = dist.get(minKey) + nb.dist;
      if (alt < dist.get(nk)) {
        dist.set(nk, alt);
        prev.set(nk, { x: node.x, z: node.z });
      }
    }
  }

  // Reconstruct path
  const path = [];
  let cur = ek;
  while (cur && cur !== sk) {
    const p = prev.get(cur);
    if (!p) return null;
    const cn = roadGraph.get(cur);
    path.unshift({ x: cn.x, z: cn.z, y: cn.y });
    cur = nodeKey(p.x, p.z);
  }
  const sn = roadGraph.get(sk);
  path.unshift({ x: sn.x, z: sn.z, y: sn.y });
  return path;
}

function findNearestRoadNode(wx, wz) {
  let bestKey = null, bestDist = Infinity;
  for (const [key, node] of roadGraph) {
    const d = Math.hypot(node.x - wx, node.z - wz);
    if (d < bestDist) { bestDist = d; bestKey = key; }
  }
  return roadGraph.get(bestKey);
}

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://unpkg.com/three@0.184.0/examples/jsm/libs/draco/gltf/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

function tryLoadGLB(name, fileName, slot) {
  gltfLoader.load(fileName,
    (gltf) => {
      console.log(`[Echo] Loaded GLB: ${fileName}`);
      const isTower = name === 'tall_tower';
      gltf.scene.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach(m => {
            if (!m) return;
            const hasTexture = !!(m.map || m.roughnessMap || m.metalnessMap || m.normalMap);

            if (isTower) {
              // Tower hero treatment — bright gothic stone, violet accents
              m.roughness = Math.max(m.roughness ?? 0.55, 0.45);
              m.metalness = Math.min(m.metalness ?? 0.04, 0.06);
              if (m.color && m.color.isColor) {
                m.color.multiplyScalar(0.95);             // nearly full brightness
                m.color.offsetHSL(0.02, 0.05, 0.08);      // slight warm lift
              }
              // Subtle violet glow on windows/detail faces
              if (m.emissive && m.emissive.isColor) {
                m.emissive.set('#553366');                 // purple window glow
                m.emissiveIntensity = 0.4;
              }
            } else if (hasTexture) {
              m.roughness = Math.max(m.roughness ?? 0.6, 0.55);
              m.metalness = Math.min(m.metalness ?? 0.05, 0.08);
              if (m.color && m.color.isColor) m.color.multiplyScalar(0.78);
              if (m.emissive && m.emissive.isColor) m.emissive.multiplyScalar(0.6);
            } else {
              m.roughness = Math.min(m.roughness ?? 0.5, 0.85);
              m.metalness = Math.min(m.metalness ?? 0.1, 0.12);
              if (m.color && m.color.isColor) { m.color.multiplyScalar(0.55); m.color.offsetHSL(0, -0.15, -0.05); }
              if (m.emissive && m.emissive.isColor) m.emissive.multiplyScalar(0.3);
            }
            m.needsUpdate = true;
          });
        }
      });
      castleParent.remove(slot.group);
      gltf.scene.position.set(...slot.pos);
      gltf.scene.rotation.y = slot.rot;
      gltf.scene.scale.setScalar(slot.scale);
      castleParent.add(gltf.scene);
      slot.glbScene = gltf.scene;
    },
    undefined,
    (err) => { console.log(`[Echo] GLB "${fileName}" not found — using placeholder`); }
  );
}

// DEMON LADY — animation clip cache + builder

const demonLadyClipCache = {}; // clipName → THREE.AnimationClip
const demonLadyBaseCache = {}; // 'base' → gltf.scene (rigged + textured, no anim)
let demonLadyClipsLoading = false;
let demonLadyClipsLoaded = false;

function loadDemonLadyClips(onProgress) {
  if (demonLadyClipsLoaded || demonLadyClipsLoading) return;
  demonLadyClipsLoading = true;

  const clipFiles = {
    idle: 'models/creatures/demon_lady/idle.glb',
    walk: 'models/creatures/demon_lady/walk.glb',
    run: 'models/creatures/demon_lady/run.glb',
    attack: 'models/creatures/demon_lady/attack.glb',
    death: 'models/creatures/demon_lady/death.glb',
  };
  let loaded = 0;
  const total = Object.keys(clipFiles).length;

  Object.entries(clipFiles).forEach(([name, file]) => {
    gltfLoader.load(file, (gltf) => {
      if (gltf.animations && gltf.animations.length > 0) {
        demonLadyClipCache[name] = gltf.animations[0];
      }
      loaded++;
      if (onProgress) onProgress(loaded / total);
      if (loaded >= total) {
        demonLadyClipsLoaded = true;
        demonLadyClipsLoading = false;
      }
    }, undefined, () => {
      loaded++;
      if (loaded >= total) {
        demonLadyClipsLoaded = true;
        demonLadyClipsLoading = false;
      }
    });
  });
}

function buildDemonLady(x, z) {
  const g = new THREE.Group();
  g.position.set(x, 0, z);
  g.scale.setScalar(3.5); // Meshy models are small in world units

  // Placeholder while loading
  const placeholder = new THREE.Mesh(
    new THREE.CylinderGeometry(0.35, 0.4, 2.0, 8),
    new THREE.MeshStandardMaterial({ color: '#442244', roughness: 0.4, metalness: 0.6, emissive: '#110011', emissiveIntensity: 0.5 })
  );
  placeholder.position.y = 1.0;
  placeholder.castShadow = true;
  g.add(placeholder);

  g.userData = {
    assetId: 'demon_lady', assetName: 'Demon Lady', placedBy: 'editor',
    isUnit: true, team: 'red', speed: 1.8,
    waypoints: [], moving: false, routeProgress: 0,
    _demonLadyLoaded: false, _mixer: null, _animActions: {}, _currentAnim: 'idle',
  };

  // Load clips if not already loading
  loadDemonLadyClips();

  // Load base model
  gltfLoader.load('models/creatures/demon_lady.glb', (gltf) => {
    const model = gltf.scene;
    model.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(m => {
          if (!m) return;
          const hasTex = !!(m.map || m.roughnessMap || m.metalnessMap || m.normalMap);
          if (hasTex) {
            m.roughness = Math.max(m.roughness ?? 0.6, 0.55);
            m.metalness = Math.min(m.metalness ?? 0.05, 0.08);
            if (m.color && m.color.isColor) m.color.multiplyScalar(0.82);
            if (m.emissive && m.emissive.isColor) m.emissive.multiplyScalar(0.5);
          } else {
            m.roughness = Math.min(m.roughness ?? 0.5, 0.85);
            m.metalness = Math.min(m.metalness ?? 0.1, 0.12);
            if (m.color && m.color.isColor) m.color.multiplyScalar(0.55);
          }
          m.needsUpdate = true;
        });
      }
    });

    // Set up animation mixer
    const mixer = new THREE.AnimationMixer(model);
    g.userData._mixer = mixer;

    // Replace placeholder with real model
    if (placeholder.parent) {
      placeholder.parent.remove(placeholder);
    }
    model.position.y = 0;
    g.add(model);

    // Setup animations once clips are ready
    function setupClips() {
      if (!demonLadyClipsLoaded) {
        setTimeout(setupClips, 200);
        return;
      }
      const actions = {};
      Object.entries(demonLadyClipCache).forEach(([name, clip]) => {
        const action = mixer.clipAction(clip);
        action.setLoop(name === 'death' ? THREE.LoopOnce : THREE.LoopRepeat);
        action.clampWhenFinished = true;
        actions[name] = action;
      });
      g.userData._animActions = actions;
      // Play idle by default
      if (actions.idle) {
        actions.idle.play();
        g.userData._currentAnim = 'idle';
      }
    }
    setupClips();

    g.userData._demonLadyLoaded = true;

  }, undefined, () => {});

  return g;
}

const scatterModels = {}; // name → cached gltf.scene

// Deep-clone a Three.js object tree (works for static meshes)
function deepClone(obj) {
  const clone = obj.clone(true); // recursive material clone
  clone.traverse(child => {
    if (child.isMesh) {
      child.material = Array.isArray(child.material)
        ? child.material.map(m => m.clone())
        : child.material.clone();
    }
  });
  return clone;
}

function loadScatterGLB(name, fileName, placements, baseScale, baseRotY) {
  gltfLoader.load(fileName,
    (gltf) => {
      console.log(`[Voxya] Loaded scatter: ${fileName} → ${placements.length} placements`);
      scatterModels[name] = gltf.scene;

      placements.forEach(({ px, pz, s, ry }) => {
        const clone = deepClone(gltf.scene);
        clone.traverse(child => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            const mats = Array.isArray(child.material) ? child.material : [child.material];
            mats.forEach(m => {
              if (!m) return;
              // Check if this material has texture maps (Meshy textured model)
              const hasTexture = !!(m.map || m.roughnessMap || m.metalnessMap || m.normalMap);

              if (hasTexture) {
                // Textured model — gentle adjustment to preserve detail
                m.roughness = Math.max(m.roughness ?? 0.6, 0.55);
                m.metalness = Math.min(m.metalness ?? 0.05, 0.08);
                if (m.color && m.color.isColor) {
                  m.color.multiplyScalar(0.78); // mild darkening
                }
                if (m.emissive && m.emissive.isColor) {
                  m.emissive.multiplyScalar(0.6);
                }
              } else {
                // No texture — apply full Voxya gothic treatment
                m.roughness = Math.min(m.roughness ?? 0.5, 0.82);
                m.metalness = Math.min(m.metalness ?? 0.1, 0.1);
                if (m.color && m.color.isColor) {
                  m.color.multiplyScalar(0.5);
                  m.color.offsetHSL(0.05, -0.1, -0.05);
                }
                if (m.emissive && m.emissive.isColor) {
                  m.emissive.multiplyScalar(0.5);
                  m.emissive.offsetHSL(0.08, 0.2, 0);
                }
              }
              m.needsUpdate = true;
            });
          }
        });
        const sc = s ?? baseScale;
        clone.scale.setScalar(sc + (Math.random() - 0.5) * sc * 0.3);
        clone.position.set(px, 0, pz);
        clone.rotation.y = (ry ?? baseRotY) + (Math.random() - 0.5) * 0.5;
        worldGroup.add(clone);
      });
      // Remove procedural fallbacks for this type
      const fallbackGroup = scatterFallbacks[name];
      if (fallbackGroup) { worldGroup.remove(fallbackGroup); scatterFallbacks[name] = null; }
    },
    undefined,
    (err) => { console.log(`[Voxya] "${fileName}" not found — using procedural fallback`); }
  );
}

// Procedural fallback placements (built from primitives, used if GLB is missing)
const scatterFallbacks = {};

function scatterFallback(name, builderFn, placements) {
  const g = new THREE.Group();
  placements.forEach(({ px, pz, s, ry }) => {
    const item = builderFn(px, pz, s ?? 1);
    item.rotation.y = (ry ?? 0) + (Math.random() - 0.5) * 0.5;
    g.add(item);
  });
  worldGroup.add(g);
  scatterFallbacks[name] = g;
}

// ============================================================
// PROCEDURAL MAP DECORATION — MTG-style dark fantasy fill
// Fills every island with dense, large-scale environmental objects
// ============================================================

function pointInPolygon(px, pz, verts) {
  let inside = false;
  for (let i = 0, j = verts.length - 1; i < verts.length; j = i++) {
    const xi = verts[i][0], zi = verts[i][1];
    const xj = verts[j][0], zj = verts[j][1];
    if ((zi > pz) !== (zj > pz) && px < (xj - xi) * (pz - zi) / (zj - zi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

function isOnIsland(wx, wz) {
  for (const is of islands) {
    if (pointInPolygon(wx - is.x, wz - is.z, is.verts)) return is;
  }
  return null;
}

function distToSegment(px, pz, x1, z1, x2, z2) {
  const dx = x2 - x1, dz = z2 - z1;
  const len2 = dx * dx + dz * dz;
  if (len2 < 0.001) return Math.hypot(px - x1, pz - z1);
  let t = ((px - x1) * dx + (pz - z1) * dz) / len2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), pz - (z1 + t * dz));
}

function distToNearestRoad(wx, wz) {
  let minDist = Infinity;
  for (const pts of roadPaths) {
    for (let i = 0; i < pts.length - 1; i++) {
      const d = distToSegment(wx, wz, pts[i][0], pts[i][1], pts[i + 1][0], pts[i + 1][1]);
      if (d < minDist) minDist = d;
    }
  }
  return minDist;
}

function decorateMap() {
  console.log('[Voxya] Generating MTG-style map decoration...');

  // Island-specific themes — each island gets a distinct feel
  const themes = {
    central:    { trees: 0.40, boulders: 0.20, tombs: 0.15, bushes: 0.15, bones: 0.10 },
    stronghold: { trees: 0.22, boulders: 0.28, tombs: 0.18, bushes: 0.18, bones: 0.14 },
    forest:     { trees: 0.55, boulders: 0.12, tombs: 0.10, bushes: 0.18, bones: 0.05 },
    resource:   { trees: 0.25, boulders: 0.30, tombs: 0.20, bushes: 0.15, bones: 0.10 },
    portal:     { trees: 0.15, boulders: 0.20, tombs: 0.10, bushes: 0.30, bones: 0.25 },
    swamp:      { trees: 0.30, boulders: 0.10, tombs: 0.15, bushes: 0.30, bones: 0.15 },
  };

  const configs = [
    { theme: 'central',    roadGap: 4.0, density: 0.07 }, // Central hub — some clearance
    { theme: 'stronghold', roadGap: 2.8, density: 0.08 }, // P1 NW Stronghold
    { theme: 'forest',     roadGap: 2.2, density: 0.12 }, // P1 W Forward Base — dense forest
    { theme: 'resource',   roadGap: 2.2, density: 0.10 }, // P1 SW Resource
    { theme: 'forest',     roadGap: 2.2, density: 0.11 }, // P1 NW-mid — forest approach
    { theme: 'swamp',      roadGap: 2.0, density: 0.11 }, // P1 SW-mid — swampy
    { theme: 'stronghold', roadGap: 2.8, density: 0.08 }, // P2 NE Stronghold
    { theme: 'forest',     roadGap: 2.2, density: 0.12 }, // P2 E Forward Base — dense forest
    { theme: 'resource',   roadGap: 2.2, density: 0.10 }, // P2 SE Resource
    { theme: 'forest',     roadGap: 2.2, density: 0.11 }, // P2 NE-mid — haunted grove
    { theme: 'swamp',      roadGap: 2.0, density: 0.11 }, // P2 SE-mid — swampy
    { theme: 'portal',     roadGap: 4.5, density: 0.05 }, // Portal Island — sacred, sparse
  ];

  const placed = [];
  let totalPlaced = 0;

  for (let i = 0; i < islands.length; i++) {
    const is = islands[i];
    const cfg = configs[i] || configs[0];
    const th = themes[cfg.theme] || themes.central;

    // World-space bounds for this island
    let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
    for (const [vx, vz] of is.verts) {
      const wx = vx + is.x, wz = vz + is.z;
      if (wx < minX) minX = wx; if (wx > maxX) maxX = wx;
      if (wz < minZ) minZ = wz; if (wz > maxZ) maxZ = wz;
    }
    minX -= 1; maxX += 1; minZ -= 1; maxZ += 1;

    const area = (maxX - minX) * (maxZ - minZ);
    const attempts = Math.floor(area * cfg.density * 3);
    let islandPlaced = 0;

    for (let a = 0; a < attempts; a++) {
      const wx = minX + Math.random() * (maxX - minX);
      const wz = minZ + Math.random() * (maxZ - minZ);

      // Must land on THIS island
      const hit = isOnIsland(wx, wz);
      if (!hit || hit !== is) continue;

      // Must be away from roads
      if (distToNearestRoad(wx, wz) < cfg.roadGap) continue;

      const y = getTerrainY(wx, wz);
      const roll = Math.random();
      let cum = 0;
      let obj = null;

      // Dead tree — gothic, twisted, large scale
      cum += th.trees;
      if (!obj && roll < cum) {
        const h = 3 + Math.random() * 7;
        obj = buildDeadTree(wx, wz, h);
        obj.scale.setScalar(1.5 + Math.random() * 3.0);
        obj.rotation.y = Math.random() * Math.PI * 2;
        obj.position.y = y;
      }

      // Boulder — dark, rough, multi-scale
      cum += th.boulders;
      if (!obj && roll < cum) {
        const s = 0.6 + Math.random() * 4.0;
        obj = buildBoulder(wx, wz, s);
        obj.position.y = y;
      }

      // Tombstone / bone cluster — death-themed accents
      cum += th.tombs;
      if (!obj && roll < cum) {
        obj = new THREE.Group();
        const count = 1 + Math.floor(Math.random() * 6);
        for (let t = 0; t < count; t++) {
          const style = Math.random();
          if (style < 0.55) {
            // Upright tombstone
            const ts = mesh(new THREE.BoxGeometry(0.3 + Math.random() * 0.6, 0.7 + Math.random() * 1.5, 0.1), bonePale);
            ts.position.set(scat(2.5), 0.35, scat(2.5));
            ts.rotation.y = scat(0.6);
            ts.rotation.z = scat(0.15);
            obj.add(ts);
          } else if (style < 0.80) {
            // Crossed bone pair
            const bg = new THREE.Group();
            const b1 = mesh(new THREE.CylinderGeometry(0.05, 0.07, 0.6 + Math.random() * 1.0, 5), bonePale);
            b1.rotation.z = Math.PI * 0.5 + scat(0.4);
            b1.position.set(scat(2), 0.1 + Math.random() * 0.3, scat(2));
            bg.add(b1);
            const b2 = mesh(new THREE.CylinderGeometry(0.04, 0.06, 0.5 + Math.random() * 0.9, 5), bonePale);
            b2.rotation.x = Math.PI * 0.5 + scat(0.4);
            b2.position.set(scat(2), 0.1 + Math.random() * 0.3, scat(2));
            bg.add(b2);
            obj.add(bg);
          } else {
            // Leaning obelisk fragment
            const frag = mesh(new THREE.CylinderGeometry(0.06, 0.15, 0.6 + Math.random() * 1.2, 5), bonePale);
            frag.position.set(scat(2.5), 0.3, scat(2.5));
            frag.rotation.z = 0.3 + scat(0.7);
            frag.rotation.x = scat(0.4);
            obj.add(frag);
          }
        }
        obj.position.set(wx, y, wz);
        obj.rotation.y = Math.random() * Math.PI * 2;
      }

      // Bush / dead undergrowth — dark foliage clumps
      cum += th.bushes;
      if (!obj && roll < cum) {
        obj = new THREE.Group();
        const count = 2 + Math.floor(Math.random() * 5);
        for (let b = 0; b < count; b++) {
          const bush = mesh(
            new THREE.ConeGeometry(0.25 + Math.random() * 0.7, 0.6 + Math.random() * 1.8, 6),
            mat('#0a1008', { roughness: 0.96, metalness: 0 })
          );
          bush.position.set(scat(2), 0.3, scat(2));
          bush.rotation.z = scat(0.5);
          bush.rotation.x = scat(0.3);
          obj.add(bush);
        }
        obj.position.set(wx, y, wz);
      }

      // Single scattered bone
      cum += th.bones;
      if (!obj && roll < cum) {
        obj = mesh(new THREE.CylinderGeometry(0.04, 0.06, 0.3 + Math.random() * 0.6, 5), bonePale);
        obj.rotation.z = Math.PI * 0.5 + scat(0.4);
        obj.rotation.x = scat(0.6);
        obj.position.set(wx, y + 0.04, wz);
      }

      if (obj) {
        placed.push(obj);
        islandPlaced++;
        totalPlaced++;
      }
    }
    console.log(`[Voxya]   ${cfg.theme} island at (${is.x.toFixed(0)}, ${is.z.toFixed(0)}): ${islandPlaced} objects`);
  }

  const decoGroup = new THREE.Group();
  decoGroup.name = 'map_decoration';
  placed.forEach(obj => decoGroup.add(obj));
  worldGroup.add(decoGroup);
  console.log('[Voxya] Map decoration complete —', totalPlaced, 'total objects placed');
}

	// USER-PLACED OBJECTS (from voxya-map-3.json export)
	// ============================================================
	function placeWorldObject(builder, px, py, pz, rx, ry, rz, sx, sy, sz, userData, matOverride) {
		const obj = builder();
		obj.position.set(px, py, pz);
		obj.rotation.set(rx, ry, rz);
		obj.scale.set(sx, sy, sz);
		obj.userData = { placedBy:'editor', ...userData };
		if (matOverride) {
			obj.traverse(c => {
				if (c.isMesh && c.material) {
					const list = Array.isArray(c.material) ? c.material : [c.material];
					list.forEach(m => {
						if (m.isMeshStandardMaterial) {
							if (matOverride.color && m.color && m.color.isColor) m.color.set(matOverride.color);
							if (matOverride.roughness !== undefined) m.roughness = matOverride.roughness;
							if (matOverride.metalness !== undefined) m.metalness = matOverride.metalness;
							m.needsUpdate = true;
						}
					});
				}
			});
		}
		worldGroup.add(obj);

		// Add floating HP label for portal and operator markers
		if (userData.markerType === 'portal' || userData.markerType === 'operator') {
			const box = new THREE.Box3().setFromObject(obj);
			const topY = box.max.y;
			const isPortal = userData.markerType === 'portal';
			const accentColor = isPortal ? '#c880ff' : '#ee5544';
			const darkColor  = isPortal ? '#1a0030' : '#1a0404';
			const glowColor  = isPortal ? '#e8c0ff' : '#ffb0a0';

			const canvas = document.createElement('canvas');
			canvas.width = 512; canvas.height = 128;
			const ctx = canvas.getContext('2d');
			const w = canvas.width, h = canvas.height;

			// Pill banner background
			ctx.fillStyle = darkColor;
			ctx.beginPath();
			ctx.roundRect(40, 8, w - 80, h - 16, 20);
			ctx.fill();

			// Outer glow border
			ctx.strokeStyle = accentColor;
			ctx.lineWidth = 3;
			ctx.shadowColor = glowColor;
			ctx.shadowBlur = 12;
			ctx.beginPath();
			ctx.roundRect(40, 8, w - 80, h - 16, 20);
			ctx.stroke();
			ctx.shadowBlur = 0;

			// Inner subtle border
			ctx.strokeStyle = glowColor;
			ctx.lineWidth = 1;
			ctx.globalAlpha = 0.5;
			ctx.beginPath();
			ctx.roundRect(46, 14, w - 92, h - 28, 16);
			ctx.stroke();
			ctx.globalAlpha = 1;

			// HP number — large bold with shadow
			ctx.font = 'bold 64px "Courier New", monospace';
			ctx.textAlign = 'center';
			ctx.textBaseline = 'middle';
			ctx.shadowColor = accentColor;
			ctx.shadowBlur = 8;
			ctx.fillStyle = glowColor;
			ctx.fillText('8000', w / 2, h / 2 + 2);
			ctx.shadowBlur = 0;

			// "HP" badge top-left
			ctx.font = 'bold 18px "Courier New", monospace';
			ctx.fillStyle = darkColor;
			ctx.beginPath();
			ctx.arc(76, 34, 18, 0, Math.PI * 2);
			ctx.fill();
			ctx.fillStyle = accentColor;
			ctx.beginPath();
			ctx.arc(76, 34, 18, 0, Math.PI * 2);
			ctx.stroke();
			ctx.fillStyle = glowColor;
			ctx.fillText('HP', 76, 34);

			const texture = new THREE.CanvasTexture(canvas);
			texture.minFilter = THREE.LinearFilter;
			texture.magFilter = THREE.LinearFilter;
			const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false, depthWrite: false });
			const sprite = new THREE.Sprite(spriteMat);
			sprite.scale.set(6.5, 1.625, 1);
			sprite.position.set(px, topY + 2.0, pz);
			sprite.userData = { target: obj, baseTopY: topY };
			scene.add(sprite);
			if (!window._floatingLabels) window._floatingLabels = [];
			window._floatingLabels.push(sprite);
		}

		return obj;
	}

// Extra GLB cache for editor-placed models
const editorGLBCache = {};

function getGLBSource(assetId) {
  if (editorGLBCache[assetId]) return editorGLBCache[assetId];
  const slot = glbSlots[assetId];
  if (slot && slot.glbScene) return slot.glbScene; // already treated by tryLoadGLB
  return null;
}

function applyEditorMaterial(child) {
  if (!child.isMesh) return;
  child.castShadow = true; child.receiveShadow = true;
  const mats = Array.isArray(child.material) ? child.material : [child.material];
  mats.forEach(m => {
    if (!m) return;
    const hasTex = !!(m.map || m.roughnessMap || m.metalnessMap || m.normalMap);
    if (hasTex) {
      m.roughness = Math.max(m.roughness ?? 0.6, 0.55);
      m.metalness = Math.min(m.metalness ?? 0.05, 0.08);
      if (m.color && m.color.isColor) m.color.multiplyScalar(0.78);
      if (m.emissive && m.emissive.isColor) m.emissive.multiplyScalar(0.6);
    } else {
      m.roughness = Math.min(m.roughness ?? 0.5, 0.85);
      m.metalness = Math.min(m.metalness ?? 0.1, 0.12);
      if (m.color && m.color.isColor) { m.color.multiplyScalar(0.55); m.color.offsetHSL(0,-0.15,-0.05); }
      if (m.emissive && m.emissive.isColor) m.emissive.multiplyScalar(0.3);
    }
    m.needsUpdate = true;
  });
}

// TransformControls
const transformControls = new TransformControls(camera, renderer.domElement);
transformControls.setSize(0.9);
transformControls.space = 'world';
let justDragged = false;
transformControls.addEventListener('dragging-changed', (e) => {
  controls.enabled = !e.value;
  if (e.value) justDragged = true;
});
transformControls.addEventListener('objectChange', () => {
  if (editorState.selected && !editorState._undoPushed) {
    editorState._undoPushed = true;
    const obj = editorState.selected;
    pushUndo({
      type:'transform', object:obj,
      prev:{pos:obj.position.clone(),rot:obj.rotation.clone(),scl:obj.scale.clone()}
    });
  }
});
transformControls.addEventListener('pointerUp', () => {
  editorState._undoPushed = false;
});
scene.add(transformControls);

function setTransformMode(mode) {
  // Clean up connect/route mode
  if (editorState.mode === 'connect') {
    hideRoadNodeMarkers();
    showRoadNodeMarkers('neutral');
    editorState.connectFirstNode = null;
  }
  if (editorState.mode === 'route') {
    hideRoadNodeMarkers();
    clearRouteVisuals();
    editorState.routeUnit = null;
    editorState.routeWaypoints = [];
  }
  editorState.mode = mode;
  const sel = editorState.selected;
  if (sel) {
    if (mode === 'rotate') {
      transformControls.setMode('rotate');
      transformControls.showX = true;
      transformControls.showY = true;
      transformControls.showZ = true;
    } else if (mode === 'elevate') {
      transformControls.setMode('translate');
      transformControls.setTranslationSnap(null);
      transformControls.showX = false;
      transformControls.showZ = false;
      transformControls.showY = true;
    } else if (mode === 'scale') {
      transformControls.setMode('scale');
      transformControls.showX = true;
      transformControls.showY = true;
      transformControls.showZ = true;
    } else {
      transformControls.setMode('translate');
      transformControls.showX = true;
      transformControls.showZ = true;
      transformControls.showY = false;
    }
  }
  updateModeUI();
}

// Selection outline — BoxHelper doesn't affect materials, so color previews are accurate
function highlightObject(obj) {
  if (editorState.selectionBox) unhighlightObject();
  const box = new THREE.BoxHelper(obj, 0xa78bfa);
  box.name = 'selection-box';
  box.material.depthTest = false;
  box.material.depthWrite = false;
  box.material.transparent = true;
  box.material.opacity = 0.8;
  scene.add(box);
  editorState.selectionBox = box;
}

function unhighlightObject() {
  if (editorState.selectionBox) {
    editorState.selectionBox.removeFromParent();
    if (editorState.selectionBox.geometry) editorState.selectionBox.geometry.dispose();
    if (editorState.selectionBox.material) editorState.selectionBox.material.dispose();
    editorState.selectionBox = null;
  }
}

function selectObject(obj) {
  if (editorState.selected === obj) return;
  const prevMode = editorState.mode;
  deselectObject();
  editorState.selected = obj;
  editorState.mode = prevMode;
  if (editorState.mode === 'select' || editorState.mode === 'place') {
    editorState.mode = 'translate';
  }
  highlightObject(obj);
  transformControls.attach(obj);
  if (editorState.mode === 'rotate') {
    transformControls.setMode('rotate');
  } else if (editorState.mode === 'elevate') {
    transformControls.setMode('translate');
    transformControls.setTranslationSnap(null);
    transformControls.showX = false;
    transformControls.showZ = false;
    transformControls.showY = true;
  } else if (editorState.mode === 'scale') {
    transformControls.setMode('scale');
    transformControls.showX = true;
    transformControls.showY = true;
    transformControls.showZ = true;
  } else {
    transformControls.setMode('translate');
    transformControls.showX = true;
    transformControls.showZ = true;
    transformControls.showY = false;
  }
  selectedInfo.style.display = 'block';
  const name = obj.userData?.assetName || obj.userData?.assetId || 'Object';
  selectedNameEl.textContent = name;
  populateMaterialUI();
  updateModeUI();
}

function deselectObject() {
  if (editorState.selected) {
    unhighlightObject();
    transformControls.detach();
    // Restore all axes
    transformControls.showX = true;
    transformControls.showY = true;
    transformControls.showZ = true;
    editorState.selected = null;
  }
  if (editorState.mode === 'translate' || editorState.mode === 'rotate' || editorState.mode === 'elevate' || editorState.mode === 'scale') {
    editorState.mode = 'select';
  }
  if (editorState.mode === 'route') {
    hideRoadNodeMarkers();
    clearRouteVisuals();
    editorState.routeUnit = null;
    editorState.routeWaypoints = [];
    editorState.mode = 'select';
  }
  if (editorState.mode === 'connect') {
    hideRoadNodeMarkers();
    showRoadNodeMarkers('neutral');
    editorState.connectFirstNode = null;
    editorState.mode = 'select';
  }
  selectedInfo.style.display = 'none';
  updateModeUI();
}

// Undo/Redo
function pushUndo(action) {
  editorState.undoStack.push(action);
  if (editorState.undoStack.length > 50) editorState.undoStack.shift();
  editorState.redoStack = [];
}

function undo() {
  const a = editorState.undoStack.pop();
  if (!a) return;
  if (a.type === 'place') {
    a.parent ? a.parent.remove(a.object) : worldGroup.remove(a.object);
    if (editorState.selected === a.object) deselectObject();
    editorState.redoStack.push({type:'place',object:a.object,parent:a.parent});
  } else if (a.type === 'delete') {
    (a.parent || worldGroup).add(a.object);
    a.object.position.copy(a.prev.pos);
    a.object.rotation.copy(a.prev.rot);
    a.object.scale.copy(a.prev.scl);
    editorState.redoStack.push({type:'delete',object:a.object,parent:a.parent,prev:{pos:a.object.position.clone(),rot:a.object.rotation.clone(),scl:a.object.scale.clone()}});
  } else if (a.type === 'transform') {
    const cur = {pos:a.object.position.clone(),rot:a.object.rotation.clone(),scl:a.object.scale.clone()};
    a.object.position.copy(a.prev.pos);
    a.object.rotation.copy(a.prev.rot);
    a.object.scale.copy(a.prev.scl);
    editorState.redoStack.push({type:'transform',object:a.object,prev:cur});
  } else if (a.type === 'material') {
    const mats = getEditableMaterials(a.object);
    const curStates = mats.map(m => ({
      mat:m, color:m.color.getHex(), rough:m.roughness, metal:m.metalness,
      emissive:m.emissive ? m.emissive.getHex() : 0, emissiveIntensity:m.emissiveIntensity ?? 0
    }));
    a.prev.forEach((ps, i) => {
      const m = mats[i]; if (!m) return;
      if (ps.color !== undefined && m.color && m.color.isColor) m.color.setHex(ps.color);
      if (ps.rough !== undefined) m.roughness = ps.rough;
      if (ps.metal !== undefined) m.metalness = ps.metal;
      if (ps.emissive !== undefined && m.emissive && m.emissive.isColor) m.emissive.setHex(ps.emissive);
      if (ps.emissiveIntensity !== undefined) m.emissiveIntensity = ps.emissiveIntensity;
      m.needsUpdate = true;
    });
    editorState.redoStack.push({type:'material',object:a.object,prev:curStates,attrs:a.attrs});
    populateMaterialUI();
  }
}

function redo() {
  const a = editorState.redoStack.pop();
  if (!a) return;
  if (a.type === 'place') {
    (a.parent || worldGroup).add(a.object);
    editorState.undoStack.push({type:'delete',object:a.object,parent:a.parent,prev:{pos:a.object.position.clone(),rot:a.object.rotation.clone(),scl:a.object.scale.clone()}});
  } else if (a.type === 'delete') {
    a.parent ? a.parent.remove(a.object) : worldGroup.remove(a.object);
    if (editorState.selected === a.object) deselectObject();
    editorState.undoStack.push({type:'place',object:a.object,parent:a.parent});
  } else if (a.type === 'transform') {
    const cur = {pos:a.object.position.clone(),rot:a.object.rotation.clone(),scl:a.object.scale.clone()};
    a.object.position.copy(a.prev.pos);
    a.object.rotation.copy(a.prev.rot);
    a.object.scale.copy(a.prev.scl);
    editorState.undoStack.push({type:'transform',object:a.object,prev:cur});
  } else if (a.type === 'material') {
    const mats = getEditableMaterials(a.object);
    const curStates = mats.map(m => ({
      mat:m, color:m.color.getHex(), rough:m.roughness, metal:m.metalness,
      emissive:m.emissive ? m.emissive.getHex() : 0, emissiveIntensity:m.emissiveIntensity ?? 0
    }));
    a.prev.forEach((ps, i) => {
      const m = mats[i]; if (!m) return;
      if (ps.color !== undefined && m.color && m.color.isColor) m.color.setHex(ps.color);
      if (ps.rough !== undefined) m.roughness = ps.rough;
      if (ps.metal !== undefined) m.metalness = ps.metal;
      if (ps.emissive !== undefined && m.emissive && m.emissive.isColor) m.emissive.setHex(ps.emissive);
      if (ps.emissiveIntensity !== undefined) m.emissiveIntensity = ps.emissiveIntensity;
      m.needsUpdate = true;
    });
    editorState.undoStack.push({type:'material',object:a.object,prev:curStates,attrs:a.attrs});
    populateMaterialUI();
  }
}

// Placement
function placeAsset(assetId, x, y, z) {
  const asset = ASSET_CATALOG[assetId];
  if (!asset) return null;

  if (editorState.snap) {
    x = Math.round(x / editorState.gridSize) * editorState.gridSize;
    z = Math.round(z / editorState.gridSize) * editorState.gridSize;
  }

  let obj;
  if (asset.type === 'glb') {
    const src = getGLBSource(assetId);
    if (src) {
      obj = deepClone(src);
    } else if (scatterModels[assetId]) {
      obj = deepClone(scatterModels[assetId]);
      obj.traverse(applyEditorMaterial);
    } else {
      // Build procedural fallback + start loading GLB
      if (asset.builder) {
        obj = asset.builder();
      } else {
        // Default placeholder — cylinder that shows while GLB loads
        const g = new THREE.Group();
        g.add(mesh(new THREE.CylinderGeometry(0.3, 0.35, 1.2, 6), new THREE.MeshStandardMaterial({ color:'#554433', roughness:0.8, metalness:0.1 })));
        obj = g;
      }
      gltfLoader.load(asset.file, (gltf) => {
        gltf.scene.traverse(applyEditorMaterial);
        editorGLBCache[assetId] = gltf.scene;
        // Swap placeholder for real model if the placeholder is still selected/visible
        const existing = obj;
        if (existing && existing.parent && existing.userData?.assetId === assetId && !existing.userData._replaced) {
          const realObj = deepClone(gltf.scene);
          const sc = asset.scale ?? 1.0;
          realObj.scale.setScalar(sc + (Math.random() - 0.5) * sc * 0.2);
          realObj.position.copy(existing.position);
          realObj.rotation.copy(existing.rotation);
          realObj.userData = existing.userData;
          realObj.userData._replaced = true;
          existing.parent.add(realObj);
          existing.parent.remove(existing);
          if (editorState.selected === existing) {
            deselectObject();
            selectObject(realObj);
          }
          editorGLBCache[assetId + '_obj'] = realObj;
        }
      }, undefined, () => {});
    }
  } else {
    obj = asset.builder();
  }

  const sc = asset.scale ?? 1.0;
  obj.scale.setScalar(sc + (Math.random() - 0.5) * sc * 0.2);
  obj.position.set(x, y ?? 0, z);
  obj.rotation.y = Math.random() * Math.PI * 0.1;
  obj.userData = { assetId, assetName: asset.name, placedBy:'editor' };

  worldGroup.add(obj);
  pushUndo({ type:'place', object:obj, parent:worldGroup });
  return obj;
}

// Raycaster
const editorRay = new THREE.Raycaster();
const editorMouse = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

function getEditorIntersections(e) {
  editorMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  editorMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  editorRay.setFromCamera(editorMouse, camera);
  const targets = [...worldGroup.children, ...castleParent.children, ...islandGroup.children, ..._moveIndicators];
  return editorRay.intersectObjects(targets, true);
}

function getPlacementPoint(e) {
  editorMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  editorMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  editorRay.setFromCamera(editorMouse, camera);
  // Hit terrain first — islands, boulders, placed objects
  const terrainTargets = [...islandGroup.children, ...worldGroup.children, ...castleParent.children];
  const hits = editorRay.intersectObjects(terrainTargets, true);
  if (hits.length > 0) {
    return hits[0].point.clone();
  }
  // Fall back to water-level plane
  const pt = new THREE.Vector3();
  editorRay.ray.intersectPlane(groundPlane, pt);
  return pt;
}

// Canvas click handler
let pointerDownPos = null;

renderer.domElement.addEventListener('pointerdown', (e) => {
  pointerDownPos = { x: e.clientX, y: e.clientY };
});

function onCanvasPointerUp(e) {
  if (justDragged) { justDragged = false; return; }

  // Only treat as a click if the pointer barely moved (not a drag/rotate/pan)
  if (pointerDownPos) {
    const dx = e.clientX - pointerDownPos.x;
    const dy = e.clientY - pointerDownPos.y;
    if (dx * dx + dy * dy > 25) return; // moved > 5px = orbit/pan, not a click
  }

  // Portal / creature click detection — works even when editor is closed
  const hitsForPortal = getEditorIntersections(e);
  for (const hit of hitsForPortal) {
    let obj = hit.object;
    while (obj && obj !== scene) {
      const ud = obj.userData;
      if (ud && Object.keys(ud).length > 0) {
        if (ud.assetId === 'portal_marker' || ud.markerType === 'portal') {
          if (!editorState.open || editorState.mode === 'select') {
            showPortalMenu(e, obj);
            return;
          }
        }
        if (ud.isUnit || ud.assetId === 'demon_lady') {
          if (!editorState.open || editorState.mode === 'select') {
            showCreatureMenu(e, obj);
            return;
          }
        }
      }
      obj = obj.parent;
    }
  }

  // Allow route/connect mode clicks even when editor panel is closed
  if (!editorState.open && editorState.mode !== 'route' && editorState.mode !== 'connect') return;

  if (editorState.mode === 'place' && editorState.placingAsset) {
    const pt = getPlacementPoint(e);
    if (pt && Math.abs(pt.x) < 60 && Math.abs(pt.z) < 60) {
      const obj = placeAsset(editorState.placingAsset, pt.x, pt.y, pt.z);
      if (obj) selectObject(obj);
    }
    return;
  }

  // Route mode — click road node / move indicator to set destination, or click unit to begin
  if (editorState.mode === 'route') {
    const hits = getEditorIntersections(e);
    if (hits.length > 0) {
      // Check if clicked on a road node marker or move indicator
      let clickedNode = null;
      let clickedMoveIndicator = null;
      for (const h of hits) {
        let obj = h.object;
        for (let i = 0; i < 5; i++) {
          if (obj.userData && obj.userData.isRoadNode) { clickedNode = obj; break; }
          if (obj.userData && obj.userData.isMoveIndicator) { clickedMoveIndicator = obj; break; }
          if (!obj.parent) break;
          obj = obj.parent;
        }
        if (clickedNode || clickedMoveIndicator) break;
      }

      // Resolve node data from either source
      let targetNode = null;
      if (clickedNode) {
        targetNode = { x: clickedNode.userData.nodeX, z: clickedNode.userData.nodeZ, y: clickedNode.userData.nodeY };
      } else if (clickedMoveIndicator) {
        targetNode = { x: clickedMoveIndicator.userData.nodeX, z: clickedMoveIndicator.userData.nodeZ, y: clickedMoveIndicator.userData.nodeY };
      }

      if (targetNode && editorState.routeUnit) {
        const unitPos = editorState.routeUnit.position;
        const nearest = findNearestRoadNode(unitPos.x, unitPos.z);
        if (!nearest) return;
        const path = findRoadPath(nearest.x, nearest.z, targetNode.x, targetNode.z);
        if (path && path.length > 1) {
          const team = editorState.routeUnit.userData.team || 'blue';
          const waypoints = path.slice(1).map(n => ({ x: n.x, y: (n.y ?? getTerrainY(n.x, n.z)) + 0.3, z: n.z }));
          const startY = (nearest.y ?? getTerrainY(nearest.x, nearest.z)) + 0.3;
          editorState.routeUnit.position.set(nearest.x, startY, nearest.z);
          editorState.routeUnit.userData.waypoints = waypoints;
          editorState.routeUnit.userData._routeStartPos = editorState.routeUnit.position.clone();
          editorState.routeUnit.userData.routeProgress = 0;
          editorState.routeUnit.userData.moving = true;
          drawRoadPathLine(path, team);
          hideRoadNodeMarkers();
          hideEnhancedMoveIndicators();
          editorState.routeUnit = null;
          editorState.routeWaypoints = [];
          editorState.mode = 'select';
          updateModeUI();
        }
        return;
      }
      // Check if clicked on a unit
      let obj = hits[0].object;
      while (obj.parent && obj.parent !== worldGroup && obj.parent !== castleParent && obj.parent !== scene) {
        obj = obj.parent;
      }
      if (obj && (obj.parent === worldGroup || obj.parent === castleParent) && obj.userData.isUnit) {
        hideRoadNodeMarkers();
        hideEnhancedMoveIndicators();
        clearRouteVisuals();
        editorState.routeUnit = obj;
        editorState.routeWaypoints = [];
        selectObject(obj);
        editorState.mode = 'route';
        editorState.routeWaypoints = [];
        updateModeUI();
        return;
      }
    }
    return;
  }

  // Connect mode — click first road node (start), then second (end) to create road segment
  if (editorState.mode === 'connect') {
    const hits = getEditorIntersections(e);
    let clickedNode = null;
    for (const h of hits) {
      let obj = h.object;
      for (let i = 0; i < 5; i++) {
        if (obj.userData && obj.userData.isRoadNode) { clickedNode = obj; break; }
        if (!obj.parent) break;
        obj = obj.parent;
      }
      if (clickedNode) break;
    }
    if (clickedNode) {
      const nd = clickedNode.userData;
      if (!editorState.connectFirstNode) {
        // First click — select start node
        editorState.connectFirstNode = { x: nd.nodeX, z: nd.nodeZ };
        // Highlight it bright gold
        waypointMarkers.forEach(m => {
          if (m.userData.nodeX === nd.nodeX && m.userData.nodeZ === nd.nodeZ) {
            m.traverse(c => { if (c.isMesh && c.material.isMeshBasicMaterial) c.material.color.set('#ffcc00'); });
          }
        });
        updateModeUI();
      } else if (editorState.connectFirstNode.x === nd.nodeX && editorState.connectFirstNode.z === nd.nodeZ) {
        // Clicked same node — cancel selection
        hideRoadNodeMarkers();
        showRoadNodeMarkers('neutral');
        editorState.connectFirstNode = null;
        updateModeUI();
      } else {
        // Second click — build road segment
        const a = editorState.connectFirstNode;
        const b = { x: nd.nodeX, z: nd.nodeZ };
        // Add to road graph
        addRoadEdge(a.x, a.z, b.x, b.z);
        // Build road mesh
        const roadGroup = buildRoad([[a.x, a.z], [b.x, b.z]]);
        worldGroup.add(roadGroup);
        // Track for save + cleanup
        customRoadSegments.push([a.x, a.z, b.x, b.z]);
        customRoadMeshes.push(roadGroup);
        // Add waypoint markers at both nodes (if new)
        [a, b].forEach(pt => {
          const key = nodeKey(pt.x, pt.z);
          const already = waypointMarkers.find(m => m.userData.nodeX === pt.x && m.userData.nodeZ === pt.z);
          if (!already) {
            const y = getTerrainY(pt.x, pt.z);
            const marker = buildWaypointMarker(pt.x, pt.z);
            marker.position.y = y;
            worldGroup.add(marker);
            waypointMarkers.push(marker);
          }
        });
        // Reset
        hideRoadNodeMarkers();
        showRoadNodeMarkers('neutral');
        editorState.connectFirstNode = null;
        updateModeUI();
      }
    }
    return;
  }

  // All other modes — click to select
  const modesCanSelect = ['select','translate','rotate','elevate','scale'];
  if (modesCanSelect.includes(editorState.mode)) {
    const hits = getEditorIntersections(e);
    if (hits.length > 0) {
      let obj = hits[0].object;
      while (obj.parent && obj.parent !== worldGroup && obj.parent !== castleParent && obj.parent !== scene) {
        obj = obj.parent;
      }
      if (obj && (obj.parent === worldGroup || obj.parent === castleParent)) {
        selectObject(obj);
        return;
      }
    }
    deselectObject();
  }
}

// ROUTE SYSTEM — waypoint planning + time-based movement
// ============================================================
function clearRouteVisuals() {
  if (editorState._routeLine) {
    editorState._routeLine.removeFromParent();
    if (editorState._routeLine.geometry) editorState._routeLine.geometry.dispose();
    if (editorState._routeLine.material) editorState._routeLine.material.dispose();
    editorState._routeLine = null;
  }
  if (editorState._routeMarkers) {
    editorState._routeMarkers.forEach(m => {
      m.removeFromParent();
      if (m.geometry) m.geometry.dispose();
      if (m.material) m.material.dispose();
    });
    editorState._routeMarkers = null;
  }
}

// Draw a dashed path line along the computed road route
function drawRoadPathLine(pathNodes, team) {
  clearRouteVisuals();
  if (!pathNodes || pathNodes.length < 2) return;
  const color = team === 'red' ? '#ff6644' : '#4488ff';
  const pts = pathNodes.map(n => new THREE.Vector3(n.x, (n.y ?? getTerrainY(n.x, n.z)) + 0.5, n.z));
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineDashedMaterial({ color, linewidth: 1, dashSize: 1.2, gapSize: 0.6, depthTest: true });
  const line = new THREE.Line(geo, mat);
  line.computeLineDistances();
  scene.add(line);
  editorState._routeLine = line;

  // Endpoint marker
  const end = pts[pts.length - 1];
  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 8, 6),
    new THREE.MeshBasicMaterial({ color: '#ffaa00', depthTest: false, depthWrite: false })
  );
  dot.position.copy(end);
  dot.renderOrder = 999;
  scene.add(dot);
  editorState._routeMarkers = [dot];
}

function triggerCreatureAttack(unit) {
  const ud = unit.userData;
  if (ud._animActions && ud._animActions.attack) {
    const from = ud._animActions[ud._currentAnim || 'idle'];
    const to = ud._animActions.attack;
    to.reset().play();
    to.setLoop(THREE.LoopOnce);
    to.clampWhenFinished = true;
    if (from && from !== to) {
      to.crossFadeFrom(from, 0.2, false);
    }
    ud._currentAnim = 'attack';
    // Return to idle after attack finishes
    const clip = demonLadyClipCache.attack;
    if (clip) {
      setTimeout(() => {
        if (ud._animActions && ud._animActions.idle && ud._currentAnim === 'attack') {
          const atkAction = ud._animActions.attack;
          const idleAction = ud._animActions.idle;
          idleAction.reset().play();
          idleAction.crossFadeFrom(atkAction, 0.3, false);
          ud._currentAnim = 'idle';
        }
      }, (clip.duration || 1.5) * 1000);
    }
  }
  console.log('[Voxya] Attack command on', ud.assetName || ud.assetId);
}

function triggerCreatureSpell(unit) {
  const ud = unit.userData;
  // Visual spell effect — dark energy burst
  const pos = unit.position.clone();
  pos.y += 2;
  const spellVfx = new THREE.Group();
  for (let i = 0; i < 20; i++) {
    const geo = new THREE.SphereGeometry(0.08, 6, 6);
    const mat = new THREE.MeshBasicMaterial({
      color: Math.random() < 0.5 ? '#aa44ff' : '#440088',
      transparent: true, opacity: 0.9, depthWrite: false
    });
    const orb = new THREE.Mesh(geo, mat);
    orb.position.set((Math.random() - 0.5) * 1.5, (Math.random() - 0.5) * 2, (Math.random() - 0.5) * 1.5);
    orb.userData._vfxLife = 1.5;
    orb.userData._vfxAge = 0;
    orb.renderOrder = 999;

  spellVfx.position.copy(pos);
  spellVfx.userData._vfxBirth = performance.now() / 1000;
  spellVfx.name = 'spell_vfx';
  scene.add(spellVfx);
  _activeVfx.push(spellVfx);
  console.log('[Voxya] Spell invoked on', ud.assetName || ud.assetId);
}

// Enhanced move indicators — glowing floating rings above road nodes
let _moveIndicators = [];
const _activeVfx = []; // tracked VFX for efficient per-frame updates
function showEnhancedMoveIndicators(team) {
  hideEnhancedMoveIndicators();
  const color = team === 'red' ? '#ff4466' : '#4488ff';
  const glowColor = team === 'red' ? '#ff2244' : '#2266ff';

  roadGraph.forEach((node) => {
    const g = new THREE.Group();
    g.position.set(node.x, node.y + 0.6, node.z);

    // Pulsing ring (larger for easier clicking)
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.55, 0.09, 8, 16),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.85, depthTest: true, depthWrite: false })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.renderOrder = 900;
    ring.name = 'move-ring';
    g.add(ring);

    // Outer glow ring
    const outer = new THREE.Mesh(
      new THREE.TorusGeometry(0.75, 0.05, 8, 16),
      new THREE.MeshBasicMaterial({ color: glowColor, transparent: true, opacity: 0.45, depthTest: true, depthWrite: false })
    );
    outer.rotation.x = -Math.PI / 2;
    outer.renderOrder = 899;
    outer.name = 'move-outer';
    g.add(outer);

    // Center dot (larger)
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 8, 6),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9, depthTest: false, depthWrite: false })
    );
    dot.renderOrder = 998;
    dot.name = 'move-dot';
    g.add(dot);

    g.userData = { isMoveIndicator: true, nodeX: node.x, nodeZ: node.z, nodeY: node.y, birth: performance.now() / 1000 };
    g.name = 'move-indicator';
    scene.add(g);
    _moveIndicators.push(g);
  });
}

function hideEnhancedMoveIndicators() {
  _moveIndicators.forEach(g => {
    g.traverse(c => {
      if (c.geometry) c.geometry.dispose();
      if (c.material) {
        if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
        else c.material.dispose();
      }
    });
    g.removeFromParent();
  });
  _moveIndicators = [];
}

// Update move indicator animations (called in animate loop)
function updateMoveIndicators(time) {
  _moveIndicators.forEach(g => {
    const age = time - (g.userData.birth || time);
    const pulse = 1 + Math.sin(age * 3) * 0.15;
    g.children.forEach(child => {
      if (child.name === 'move-ring') {
        child.scale.setScalar(pulse);
        child.material.opacity = 0.55 + Math.sin(age * 3) * 0.3;
      }
      if (child.name === 'move-outer') {
        child.scale.setScalar(pulse * 1.1);
        child.material.opacity = 0.25 + Math.sin(age * 3 + 1) * 0.2;
      }
      if (child.name === 'move-dot') {
        child.position.y = Math.sin(age * 4) * 0.2;
      }
    });
  });
}

// Right-click handler for context menus
renderer.domElement.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  hideContextMenus();

  // Use the same proven raycast function as the editor click handler
  editorMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  editorMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  editorRay.setFromCamera(editorMouse, camera);

  // Cast against all interactive world objects
  const allTargets = [...worldGroup.children, ...castleParent.children, ...islandGroup.children];
  const hits = editorRay.intersectObjects(allTargets, true);

  for (const hit of hits) {
    // Walk up from the hit mesh to find any ancestor with meaningful userData
    let obj = hit.object;
    while (obj && obj !== scene) {
      const ud = obj.userData;
      if (ud && Object.keys(ud).length > 0) {
        // Portal detection
        if (ud.assetId === 'portal_marker' || ud.markerType === 'portal') {
          showPortalMenu(e, obj);
          return;
        }
        // Creature / unit detection
        if (ud.isUnit || ud.assetId === 'demon_lady') {
          showCreatureMenu(e, obj);
          return;
        }
        if (ud.placedBy === 'editor' && ud.isUnit) {
          showCreatureMenu(e, obj);
          return;
        }
        // Continue walking up — this might be a child group, parent has the real userData
      }
      obj = obj.parent;
    }
  }

  // No portal/creature found under cursor
});
