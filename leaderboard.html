<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard — Forgotten Domain</title>
    <link rel="stylesheet" href="css/nav.css">
    <style>
        :root {
            --void: #03050a;
            --deep-space: #0a0e1a;
            --star-white: #e8ecf1;
            --nebula-purple: #7c3aed;
            --nebula-blue: #3b82f6;
            --gold: #f59e0b;
            --silver: #94a3b8;
            --bronze: #d97706;
            --panel-bg: rgba(10, 14, 26, 0.85);
            --border-subtle: rgba(124, 58, 237, 0.2);
            --text-dim: #8b93a8;
            --accent-green: #10b981;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            background: var(--void);
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            color: var(--star-white);
        }

        /* === COSMIC BACKGROUND === */
        .cosmic-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .stars {
            position: absolute;
            inset: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.08;
            pointer-events: none;
        }

        .nebula-1 {
            top: -10%;
            left: -5%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, #7c3aed, transparent 70%);
        }

        .nebula-2 {
            bottom: -10%;
            right: -5%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, #3b82f6, transparent 70%);
        }

        .nebula-3 {
            top: 30%;
            left: 40%;
            width: 40%;
            height: 40%;
            background: radial-gradient(circle, #10b981, transparent 60%);
        }

        /* === MAIN CONTENT === */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px 100px;
        }

        /* === HEADER === */
        .lb-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .lb-mission-patch {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border: 2px solid rgba(124, 58, 237, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 14, 26, 0.6);
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.2);
        }

        .lb-mission-patch svg {
            width: 48px;
            height: 48px;
        }

        .lb-title {
            font-family: 'Times New Roman', serif;
            font-size: 2rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #c4b5fd;
            text-shadow: 0 0 30px rgba(124, 58, 237, 0.5);
            margin-bottom: 4px;
        }

        .lb-subtitle {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        /* === SCORE LEGEND === */
        .score-legend {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .legend-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-dot.territory { background: #f59e0b; }
        .legend-dot.creature { background: #10b981; }
        .legend-dot.spell { background: #7c3aed; }
        .legend-dot.win { background: #3b82f6; }

        .legend-value {
            color: var(--star-white);
            font-weight: 600;
        }

        /* === LEADERBOARD TABLE === */
        .lb-table-wrap {
            background: var(--panel-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(124, 58, 237, 0.08);
        }

        .lb-table-header {
            display: grid;
            grid-template-columns: 52px 1fr 100px 80px 140px;
            padding: 14px 20px;
            background: rgba(124, 58, 237, 0.08);
            border-bottom: 1px solid var(--border-subtle);
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .lb-row {
            display: grid;
            grid-template-columns: 52px 1fr 100px 80px 140px;
            padding: 16px 20px;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background 0.2s;
            position: relative;
        }

        .lb-row:hover {
            background: rgba(124, 58, 237, 0.05);
        }

        .lb-row:last-child {
            border-bottom: none;
        }

        .lb-row.top-1 { background: rgba(245, 158, 11, 0.06); }
        .lb-row.top-2 { background: rgba(148, 163, 184, 0.04); }
        .lb-row.top-3 { background: rgba(217, 119, 6, 0.04); }

        /* Rank */
        .lb-rank {
            font-size: 1rem;
            font-weight: 700;
            text-align: center;
        }

        .rank-1 { color: #fbbf24; text-shadow: 0 0 12px rgba(245, 158, 11, 0.5); font-size: 1.2rem; }
        .rank-2 { color: #cbd5e1; text-shadow: 0 0 8px rgba(148, 163, 184, 0.4); }
        .rank-3 { color: #f59e0b; text-shadow: 0 0 8px rgba(217, 119, 6, 0.4); }

        /* Player */
        .lb-player {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lb-origin-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(124, 58, 237, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .lb-player-info {
            min-width: 0;
        }

        .lb-display-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--star-white);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lb-origin-name {
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        /* Score */
        .lb-score {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            text-align: right;
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
        }

        /* Games */
        .lb-games {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-align: center;
        }

        /* Stats mini */
        .lb-stats {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            font-size: 0.6rem;
            letter-spacing: 0.05em;
            color: var(--text-dim);
        }

        .lb-stat {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .lb-stat-icon {
            font-size: 0.65rem;
        }

        /* === STATES === */
        .lb-loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .lb-loading-spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 16px;
            border: 2px solid rgba(124, 58, 237, 0.2);
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .lb-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .lb-empty-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .lb-error {
            text-align: center;
            padding: 40px 20px;
            color: #f87171;
            font-size: 0.75rem;
        }

        .lb-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(139, 147, 168, 0.3);
        }

        /* === BACK LINK === */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 24px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #c4b5fd;
        }

        /* === RESPONSIVE === */
        @media (max-width: 640px) {
            .lb-table-header,
            .lb-row {
                grid-template-columns: 44px 1fr 80px;
            }

            .lb-games,
            .lb-stats {
                display: none;
            }

            .lb-title {
                font-size: 1.4rem;
            }

            .score-legend {
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Cosmic Background -->
    <div class="cosmic-bg">
        <div class="stars" id="stars"></div>
        <div class="nebula nebula-1"></div>
        <div class="nebula nebula-2"></div>
        <div class="nebula nebula-3"></div>
    </div>

    <div class="main-container">
        <a href="menu.html" class="back-link">← Back to Menu</a>

        <div class="lb-header">
            <div class="lb-mission-patch">
                <svg viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="22" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
                    <circle cx="24" cy="24" r="15" stroke="#7c3aed" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>
                    <path d="M24 8 L28 20 L24 24 L20 20 Z" fill="#fbbf24" opacity="0.8"/>
                    <circle cx="24" cy="20" r="2" fill="white"/>
                    <line x1="24" y1="24" x2="24" y2="40" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
                    <line x1="16" y1="36" x2="32" y2="36" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
                    <text x="24" y="44" text-anchor="middle" fill="#7c3aed" font-size="4" font-family="serif" opacity="0.5">FD</text>
                </svg>
            </div>
            <h1 class="lb-title">Dominion Leaderboard</h1>
            <p class="lb-subtitle">Forgotten Domain · Command Log</p>
        </div>

        <!-- Score Legend -->
        <div class="score-legend">
            <div class="legend-item">
                <span class="legend-dot territory"></span>
                Territory <span class="legend-value">×100</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot creature"></span>
                Creatures <span class="legend-value">×50</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot spell"></span>
                Spells <span class="legend-value">×25</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot win"></span>
                Victories <span class="legend-value">×500</span>
            </div>
        </div>

        <!-- Leaderboard Table -->
        <div class="lb-table-wrap" id="lb-table-wrap">
            <div class="lb-loading" id="lb-loading">
                <div class="lb-loading-spinner"></div>
                <div>Establishing uplink...</div>
            </div>
        </div>

        <div class="lb-footer">Forgotten Domain · Deep Space Telemetry</div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="menu.html" class="nav-item">HOME</a>
        <a href="#" class="nav-item" data-panel="player">PLAYER</a>
        <a href="leaderboard.html" class="nav-item active">LEADERBOARD</a>
        <a href="#" class="nav-item" data-panel="academicks">ACADEMICKS</a>
    </nav>

    <script src="js/nav.js"></script>
    <script>
        // Generate stars
        (function() {
            const container = document.getElementById('stars');
            const frag = document.createDocumentFragment();
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 2 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', (Math.random() * 5) + 's');
                star.style.opacity = Math.random() * 0.6 + 0.2;
                frag.appendChild(star);
            }
            container.appendChild(frag);
        })();

        // Fetch leaderboard
        async function fetchLeaderboard() {
            const wrap = document.getElementById('lb-table-wrap');
            try {
                const res = await fetch('/api/leaderboard?limit=20');
                if (!res.ok) throw new Error('Uplink failed');

                const data = await res.json();
                const board = data.leaderboard;

                if (!board || board.length === 0) {
                    wrap.innerHTML = `
                        <div class="lb-empty">
                            <div class="lb-empty-icon">🛰️</div>
                            <div>No signals detected yet.</div>
                            <div style="font-size:0.65rem;margin-top:4px;opacity:0.5">Be the first to claim your territory.</div>
                        </div>`;
                    return;
                }

                const rows = board.map((entry, i) => {
                    const rankClass = entry.rank <= 3 ? `rank-${entry.rank}` : '';
                    const rowClass = entry.rank <= 3 ? `top-${entry.rank}` : '';
                    const displayName = entry.display_name || entry.username;
                    const originName = entry.origin_name || 'Unclaimed';
                    const originIcon = entry.origin_icon || '✦';

                    return `
                        <div class="lb-row ${rowClass}">
                            <div class="lb-rank ${rankClass}">${entry.rank <= 3 ? ['🥇','🥈','🥉'][entry.rank - 1] : entry.rank}</div>
                            <div class="lb-player">
                                <div class="lb-origin-icon">${originIcon}</div>
                                <div class="lb-player-info">
                                    <div class="lb-display-name">${escapeHtml(displayName)}</div>
                                    <div class="lb-origin-name">${escapeHtml(originName)}</div>
                                </div>
                            </div>
                            <div class="lb-score">${entry.score.toLocaleString()}</div>
                            <div class="lb-games">${entry.games_played} games</div>
                            <div class="lb-stats">
                                <span class="lb-stat"><span class="lb-stat-icon">🏰</span>${entry.territories_claimed}</span>
                                <span class="lb-stat"><span class="lb-stat-icon">👾</span>${entry.creatures_summoned}</span>
                                <span class="lb-stat"><span class="lb-stat-icon">✨</span>${entry.spells_cast}</span>
                            </div>
                        </div>`;
                }).join('');

                const header = `
                    <div class="lb-table-header">
                        <span>RANK</span>
                        <span>COMMANDER</span>
                        <span style="text-align:right">SCORE</span>
                        <span style="text-align:center">SORTIES</span>
                        <span style="text-align:right">ASSETS</span>
                    </div>`;

                wrap.innerHTML = header + rows;
            } catch (err) {
                console.error('Leaderboard fetch error:', err);
                wrap.innerHTML = `
                    <div class="lb-error">
                        ⚠ Uplink failure — telemetry unavailable.<br>
                        <span style="font-size:0.65rem;opacity:0.6">${err.message}</span>
                    </div>`;
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        fetchLeaderboard();
    </script>
</body>
</html>
